// ============================ GIZMOS ============================
const gizmoLayer=$('gizmoLayer');
let gizmoEls=[];   // {el, handle, node}
function buildGizmos(){
  gizmoLayer.innerHTML=''; gizmoEls=[];
  const a=active(); if(!a||!a.nodes.length) return;
  // Full controls (arrows, speed, height, trash, look-at) on the primary selected
  // node only; every other node gets a lightweight square handle you can click to
  // select or drag to move. The selected node's target shows a handle when fixed.
  a.nodes.forEach((n,i)=>{
    const isSel = i===selectedNode || selection.has(i);
    const full  = i===selectedNode;
    gizmoEls.push(makeGizmo('drone',i,full,isSel));
    if(full && n.target) gizmoEls.push(makeGizmo('target',i,true,true));
  });
}
function makeGizmo(handle,nodeIndex,full,selected){
  const g=document.createElement('div'); g.className='gizmo'+(selected?' sel':'');
  const sq=document.createElement('div'); sq.className='gz-sq';
  const lab=document.createElement('div'); lab.className='gz-lab'; lab.style.left='10px'; lab.style.top='8px';
  lab.textContent=(handle==='drone'?'WP ':'T ')+(nodeIndex+1);
  g.append(sq,lab);
  if(full){
    const ax=document.createElement('div'); ax.className='gz-x';
    const ay=document.createElement('div'); ay.className='gz-y';
    g.append(ay,ax);
    ax.addEventListener('pointerdown',e=>startGizmoDrag(e,handle,nodeIndex,'x'));
    ay.addEventListener('pointerdown',e=>startGizmoDrag(e,handle,nodeIndex,'z'));
    if(handle==='drone'){
      const tr=document.createElement('div'); tr.className='gz-trash'; tr.textContent='🗑'; tr.title='Delete waypoint';
      tr.onpointerdown=e=>e.stopPropagation();
      tr.onclick=e=>{ e.stopPropagation(); requestRemoveNode(active().id,nodeIndex); };
      g.appendChild(tr);
      const sp=document.createElement('div'); sp.className='gz-spd'; sp.title='Speed — click to cycle, drag to change';
      sp.innerHTML=speedChevrons(active().nodes[nodeIndex].speed);
      attachSpeedScrub(sp, active().id, nodeIndex, 'gizmo');
      g.appendChild(sp);
      const hg=document.createElement('div'); hg.className='gz-hgt'; hg.title='Height above ground (20 m steps)';
      const hm=document.createElement('button'); hm.className='hb'; hm.textContent='−';
      const hv=document.createElement('span'); hv.className='hv'; hv.textContent=active().nodes[nodeIndex].agl+' m';
      const hp=document.createElement('button'); hp.className='hb'; hp.textContent='+';
      hm.onpointerdown=hp.onpointerdown=e=>e.stopPropagation();
      hm.onclick=e=>{ e.stopPropagation(); const n=active().nodes[nodeIndex]; applyEdit('agl',n.agl-HEIGHT_STEP,nodeIndex); };
      hp.onclick=e=>{ e.stopPropagation(); const n=active().nodes[nodeIndex]; applyEdit('agl',n.agl+HEIGHT_STEP,nodeIndex); };
      hg.append(hm,hv,hp); g.appendChild(hg);
      g._hval=hv;
      attachHeightScrub(hv, active().id, nodeIndex, 'gizmo');
      // Look-at is governed by the path's camera type (no per-waypoint toggle).
      // On a Targeted path, right-press-drag the map to aim this waypoint's look-at.
    } else if(handle==='target'){
      // target height stepper: lift the look-at off the ground (20 m steps)
      const tn=active().nodes[nodeIndex];
      const hg=document.createElement('div'); hg.className='gz-hgt'; hg.title='Target height above ground (20 m steps)';
      const hm=document.createElement('button'); hm.className='hb'; hm.textContent='−';
      const hv=document.createElement('span'); hv.className='hv'; hv.textContent=(tn.targetAgl||0)+' m';
      const hp=document.createElement('button'); hp.className='hb'; hp.textContent='+';
      hm.onpointerdown=hp.onpointerdown=e=>e.stopPropagation();
      hm.onclick=e=>{ e.stopPropagation(); const n=active().nodes[nodeIndex]; applyEdit('tagl',(n.targetAgl||0)-HEIGHT_STEP,nodeIndex); };
      hp.onclick=e=>{ e.stopPropagation(); const n=active().nodes[nodeIndex]; applyEdit('tagl',(n.targetAgl||0)+HEIGHT_STEP,nodeIndex); };
      hg.append(hm,hv,hp); g.appendChild(hg);
      g._hval=hv;
    }
  }
  sq.addEventListener('pointerdown',e=>{
    if(handle==='drone'){
      if(e.shiftKey){ e.stopPropagation(); e.preventDefault(); selectNode(nodeIndex,true); refreshAll(); return; }
      if(nodeIndex!==selectedNode){ selectNode(nodeIndex,false); reflectSelection(); }
    }
    startGizmoDrag(e,handle,nodeIndex,'xy');
  });
  gizmoLayer.appendChild(g);
  return {el:g, handle, node:nodeIndex, hval:g._hval||null};
}
function handleVec(handle,n){ return handle==='drone'?n.dronePos:n.target; }
function syncGizmos(){
  if(!gizmoEls.length) return;
  const a=active(); if(!a) return;
  const pf=$('pipFrame'); const pr = pf.style.display==='block' ? pf.getBoundingClientRect() : null;
  const v=new THREE.Vector3();
  gizmoEls.forEach(gz=>{
    const n=a.nodes[gz.node]; if(!n){ gz.el.style.display='none'; return; }
    const hv3=handleVec(gz.handle,n); if(!hv3){ gz.el.style.display='none'; return; }
    v.copy(hv3).project(mapCam);
    if(v.z>1){ gz.el.style.display='none'; return; }
    const sx=(v.x*0.5+0.5)*innerWidth, sy=(-v.y*0.5+0.5)*innerHeight;
    // keep handles off the preview window so they don't overlap the camera view
    if(pr && sx>pr.left-45 && sx<pr.right+45 && sy>pr.top-45 && sy<pr.bottom+45){ gz.el.style.display='none'; return; }
    gz.el.style.display='block';
    gz.el.style.left=sx+'px'; gz.el.style.top=sy+'px';
    if(gz.hval) gz.hval.textContent=(gz.handle==='target'?(n.targetAgl||0):n.agl)+' m';
  });
}
let gizmoDrag=null;
function startGizmoDrag(e,handle,nodeIndex,axis){
  e.stopPropagation(); e.preventDefault();
  gizmoDrag={handle,nodeIndex,axis,lastX:e.clientX,lastY:e.clientY,snap:snapshot(),moved:false};
  e.target.setPointerCapture(e.pointerId);
}
window.addEventListener('pointermove',e=>{
  if(!gizmoDrag) return;
  const a=active(); if(!a) return;
  const n=a.nodes[gizmoDrag.nodeIndex]; if(!n){ gizmoDrag=null; return; }
  const k=pxToWorld();
  const dx=(e.clientX-gizmoDrag.lastX)*k, dz=(e.clientY-gizmoDrag.lastY)*k;
  gizmoDrag.lastX=e.clientX; gizmoDrag.lastY=e.clientY;
  if(dx||dz) gizmoDrag.moved=true;
  const h=handleVec(gizmoDrag.handle,n);
  if(gizmoDrag.axis==='x'||gizmoDrag.axis==='xy') h.x+=dx;
  if(gizmoDrag.axis==='z'||gizmoDrag.axis==='xy') h.z+=dz;
  const clamp=WORLD/2-10; h.x=THREE.MathUtils.clamp(h.x,-clamp,clamp); h.z=THREE.MathUtils.clamp(h.z,-clamp,clamp);
  // re-drape height: drone keeps its AGL, target keeps any lift above the new ground point
  h.y = gizmoDrag.handle==='drone' ? terrainHeightAt(h.x,h.z)+n.agl : terrainHeightAt(h.x,h.z)+(n.targetAgl||0);
  // dragging a look-at handle snaps onto a nearby existing look-at point (same as right-drag)
  if(gizmoDrag.handle==='target'){
    const snap=snapToExistingTarget(new Set([gizmoDrag.nodeIndex]), e.clientX, e.clientY);
    if(snap) n.target.copy(snap);
  }
  rebuildPath(); rebuildCommitted();   // path first so tangents stay current; keep gizmo DOM
});
window.addEventListener('pointerup',()=>{ if(gizmoDrag){ if(gizmoDrag.moved) commitHistory(gizmoDrag.snap); gizmoDrag=null; refreshAll(); } });

// ============================ WIZARD HOOK ============================
// The onboarding wizard (defined lower down) registers a single listener here.
// Core editing functions call wizardNotify() at the moment a real action lands,
// so the wizard can advance on the genuine interaction rather than a generic Next.
let _wizHook=null;
function wizardNotify(type,detail){ if(_wizHook) try{ _wizHook(type,detail); }catch(e){} }

// ============================ MODAL ============================
const modalWrap=$('modalWrap'), modalCard=$('modalCard');
let modalOpen=false;
function showModal({title,body,buttons,warn}){
  modalCard.className='modalCard'+(warn?' warn':'');
  modalCard.innerHTML=`<h3></h3><p></p><div class="modalBtns"></div>`;
  modalCard.querySelector('h3').textContent=title;
  modalCard.querySelector('p').textContent=body;
  const bwrap=modalCard.querySelector('.modalBtns');
  buttons.forEach(b=>{ const btn=document.createElement('button'); btn.textContent=b.label;
    if(b.kind&&b.kind!=='ghost') btn.className=b.kind;
    btn.onclick=()=>{ closeModal(); if(b.onClick) b.onClick(); }; bwrap.appendChild(btn); });
  modalWrap.classList.add('show'); modalOpen=true;
}
function closeModal(){ modalWrap.classList.remove('show'); modalOpen=false; }
modalWrap.addEventListener('pointerdown',e=>{ if(e.target===modalWrap) closeModal(); });

// ============================ INPUT ============================
const raycaster=new THREE.Raycaster(), ndc=new THREE.Vector2();
raycaster.layers.enable(2);   // also test the 3D gizmo arrows (layer 2)
function groundPointFromEvent(e){
  ndc.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(ndc,mapCam);
  const hit=raycaster.intersectObject(ground,false);
  if(hit.length){ mouseGround.copy(hit[0].point); }
  else{ const o=raycaster.ray.origin,d=raycaster.ray.direction;
    if(Math.abs(d.y)<1e-6) return false; const t=-o.y/d.y; if(t<=0) return false;
    mouseGround.set(o.x+d.x*t, terrainHeightAt(o.x+d.x*t,o.z+d.z*t), o.z+d.z*t); }
  const h=WORLD/2-10;
  mouseGround.x=THREE.MathUtils.clamp(mouseGround.x,-h,h);
  mouseGround.z=THREE.MathUtils.clamp(mouseGround.z,-h,h);
  return true;
}
function updateAim(){
  if(!mouseValid) return;
  const gy=mouseGround.y;
  $('roX').textContent=mouseGround.x.toFixed(0); $('roZ').textContent=(-mouseGround.z).toFixed(0);
  $('roElev').textContent=gy.toFixed(0); $('roDrone').textContent=(gy+DEFAULT_AGL).toFixed(0);
}
function pxToWorld(){ return (2*camHeight*Math.tan(THREE.MathUtils.degToRad(mapCam.fov/2)))/innerHeight; }
function panBy(dx,dy){ const k=pxToWorld(),h=WORLD/2-10;
  camGoal.x=THREE.MathUtils.clamp(camGoal.x-dx*k,-h,h); camGoal.z=THREE.MathUtils.clamp(camGoal.z-dy*k,-h,h);
  camCentre.copy(camGoal); }
function recentreToMouse(){ if(mouseValid) camGoal.set(mouseGround.x,0,mouseGround.z); else recentreView(); }
function recentreView(){
  const a=active();
  if(a && selectedNode>=0 && a.nodes[selectedNode]){ const n=a.nodes[selectedNode]; camGoal.set(n.dronePos.x,0,n.dronePos.z); }
  else if(a&&a.nodes.length){ const c=new THREE.Vector3(); a.nodes.forEach(n=>c.add(n.dronePos)); c.divideScalar(a.nodes.length); camGoal.set(c.x,0,c.z); }
  else camGoal.set(0,0,0);
}

let mousePanning=false, panLast={x:0,y:0};
canvas.addEventListener('mousemove',e=>{
  if(mousePanning){ panBy(e.clientX-panLast.x,e.clientY-panLast.y); panLast={x:e.clientX,y:e.clientY}; return; }
  mouseValid=groundPointFromEvent(e); updateAim();
});
canvas.addEventListener('mousedown',e=>{
  if(e.button===2){ e.preventDefault(); startLookatDrag(e); return; }   // right-press-drag = aim look-at
  if(e.button===0){
    if(e.shiftKey){ startBoxOrToggle(e); return; }
    const hit=pickNodeAt(e.clientX,e.clientY);
    if(hit>=0){ selectNode(hit,false); refreshAll(); }                  // select existing waypoint
    else if(active() && mouseValid){ startPlacement(e); }               // press-drag-release to place
  }
  else if(e.button===1){ e.preventDefault(); mousePanning=true; panLast={x:e.clientX,y:e.clientY}; }
});
window.addEventListener('mouseup',e=>{ if(e.button===1) mousePanning=false; });
canvas.addEventListener('contextmenu',e=>e.preventDefault());   // right-button handled in mousedown

// Press-drag-release placement: the new waypoint follows the cursor and previews
// live until you let go, instead of snapping to the first click point.
function startPlacement(e){
  mouseValid=groundPointFromEvent(e); if(!mouseValid) return;
  appendNode();                       // pushes history, adds + selects the node at the cursor
  const idx=selectedNode;
  const mv=ev=>{ const a=active(), n=a&&a.nodes[idx]; if(!n) return;
    mouseValid=groundPointFromEvent(ev);
    n.dronePos.set(mouseGround.x, terrainHeightAt(mouseGround.x,mouseGround.z)+n.agl, mouseGround.z);
    rebuildPath(); rebuildCommitted(); refreshPrompt(); };
  const up=()=>{ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); refreshAll(); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}

// Right-press-drag: aim the selected waypoint's look-at, previewing until release.
// Snaps onto a nearby existing look-at point so several waypoints can share the
// exact same target.
function startLookatDrag(e){
  if(modalOpen) return;
  const a=active();
  if(a && a.cameraType==='fixed') return;   // Fixed paths frame nadir; no aimable target
  if(!a || selectedNode<0){ clearSelection(); refreshAll(); return; }   // nothing selected -> deselect
  pushHistory();
  const targets = selection.size ? [...selection] : [selectedNode];
  const exclude = new Set(targets);
  const apply=ev=>{ mouseValid=groundPointFromEvent(ev);
    const snap = snapToExistingTarget(exclude, ev.clientX, ev.clientY);
    const t = snap || new THREE.Vector3(mouseGround.x,mouseGround.y,mouseGround.z);
    targets.forEach(idx=>{ const n=a.nodes[idx]; if(n){ n.target=t.clone();
      n.targetAgl=Math.max(0, t.y-terrainHeightAt(t.x,t.z)); } });   // keep any lift from a snapped target
    rebuildPath(); rebuildCommitted(); refreshPrompt(); };
  apply(e);
  const mv=ev=>apply(ev);
  const up=ev=>{ if(ev.button!==2) return; window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); refreshAll();
    wizardNotify('targetSet', selectedNode); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}
// nearest existing fixed look-at point (in screen space) to snap onto, or null
function snapToExistingTarget(excludeSet, sx, sy){
  const a=active(); if(!a) return null;
  const v=new THREE.Vector3(); let best=null, bestD=22*22;
  a.nodes.forEach((n,i)=>{ if(!n.target || excludeSet.has(i)) return;
    v.copy(n.target).project(mapCam); if(v.z>1) return;
    const px=(v.x*0.5+0.5)*innerWidth, py=(-v.y*0.5+0.5)*innerHeight;
    const d=(px-sx)**2+(py-sy)**2; if(d<bestD){ bestD=d; best=n.target; } });
  return best ? best.clone() : null;
}

// shift+click a node toggles it in the selection; shift+drag empty draws a box
function startBoxOrToggle(e){
  const hit=pickNodeAt(e.clientX,e.clientY);
  if(hit>=0){ selectNode(hit,true); refreshAll(); return; }
  beginBoxSelect(e);
}
let boxSel=null;
function beginBoxSelect(e){
  boxSel={x0:e.clientX,y0:e.clientY,cur:null};
  const d=document.createElement('div'); d.id='marquee';
  d.style.cssText='position:fixed;z-index:30;border:1px solid #3da9ff;background:rgba(61,169,255,.12);pointer-events:none;';
  document.body.appendChild(d); boxSel.el=d; updateMarquee(e.clientX,e.clientY);
  const mv=ev=>updateMarquee(ev.clientX,ev.clientY);
  const up=()=>{ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); finishBoxSelect(); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}
function updateMarquee(x,y){
  if(!boxSel) return;
  const l=Math.min(x,boxSel.x0), t=Math.min(y,boxSel.y0), w=Math.abs(x-boxSel.x0), h=Math.abs(y-boxSel.y0);
  boxSel.cur={l,t,r:l+w,b:t+h};
  Object.assign(boxSel.el.style,{left:l+'px',top:t+'px',width:w+'px',height:h+'px'});
}
function finishBoxSelect(){
  if(!boxSel) return;
  const a=active(), box=boxSel.cur;
  if(a && box && (box.r-box.l>3 || box.b-box.t>3)){
    selMode='multi'; const v=new THREE.Vector3();
    a.nodes.forEach((n,i)=>{ v.copy(n.dronePos).project(mapCam); if(v.z>1) return;
      const sx=(v.x*0.5+0.5)*innerWidth, sy=(-v.y*0.5+0.5)*innerHeight;
      if(sx>=box.l&&sx<=box.r&&sy>=box.t&&sy<=box.b){ selection.add(i); selectedNode=i; } });
  }
  if(boxSel.el) boxSel.el.remove();
  boxSel=null; refreshAll();
}
canvas.addEventListener('wheel',e=>{ e.preventDefault();
  camHeight=THREE.MathUtils.clamp(camHeight*Math.exp(e.deltaY*0.001),250,5200); },{passive:false});

// touch — single finger places (drag to position, lift to commit) or selects a node; two fingers pan/zoom
let touchMode=null, multiTouched=false, gMid=null, gDist=0, touchPlaceIdx=-1;
const tMid=ts=>({x:(ts[0].clientX+ts[1].clientX)/2,y:(ts[0].clientY+ts[1].clientY)/2});
const tDist=ts=>Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY);
canvas.addEventListener('touchstart',e=>{ e.preventDefault();
  if(e.touches.length===1&&!multiTouched){ const t=e.touches[0];
    mouseValid=groundPointFromEvent(t); updateAim();
    const hit=pickNodeAt(t.clientX,t.clientY);
    if(hit>=0){ touchMode='aim'; selectNode(hit,false); refreshAll(); }
    else if(active()&&mouseValid){ touchMode='place'; appendNode(); touchPlaceIdx=selectedNode; }
    else touchMode='aim';
  }
  else if(e.touches.length>=2){ touchMode='gesture'; multiTouched=true; gMid=tMid(e.touches); gDist=tDist(e.touches); }
},{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault();
  if(touchMode==='gesture'&&e.touches.length>=2){ const mid=tMid(e.touches),d=tDist(e.touches);
    panBy(mid.x-gMid.x,mid.y-gMid.y); if(d>0&&gDist>0) camHeight=THREE.MathUtils.clamp(camHeight*gDist/d,250,5200);
    gMid=mid; gDist=d; }
  else if(touchMode==='place'&&e.touches.length===1){ const t=e.touches[0]; mouseValid=groundPointFromEvent(t);
    const a=active(), n=a&&a.nodes[touchPlaceIdx];
    if(n){ n.dronePos.set(mouseGround.x,terrainHeightAt(mouseGround.x,mouseGround.z)+n.agl,mouseGround.z);
      rebuildPath(); rebuildCommitted(); refreshPrompt(); } }
  else if(touchMode==='aim'&&e.touches.length===1){ mouseValid=groundPointFromEvent(e.touches[0]); updateAim(); }
},{passive:false});
canvas.addEventListener('touchend',e=>{ e.preventDefault();
  if(e.touches.length===0){
    if(touchMode==='place') refreshAll();
    touchMode=null; multiTouched=false; touchPlaceIdx=-1; }
},{passive:false});
canvas.addEventListener('touchcancel',()=>{ if(touchMode==='place') refreshAll(); touchMode=null; multiTouched=false; touchPlaceIdx=-1; });

window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ if(modalOpen) closeModal(); else { clearSelection(); refreshAll(); } return; }
  const el=document.activeElement, typing = el && /^(INPUT|TEXTAREA)$/.test(el.tagName);
  if(typing || modalOpen) return;                       // don't grab keys while editing text / in a modal
  if((e.key==='i'||e.key==='I')&&!e.repeat&&!e.ctrlKey&&!e.metaKey) recentreToMouse();
  if(e.key==='Delete'||e.key==='Backspace'){
    if(active() && selectedNode>=0){ e.preventDefault(); requestRemoveSelected(); }
  }
  if((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z') && !e.shiftKey){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey) && ((e.key==='y'||e.key==='Y') || (e.shiftKey && (e.key==='z'||e.key==='Z')))){ e.preventDefault(); redo(); return; }
});

// preview
function setPreviewBtn(){ const b=$('btnPreview'); b.classList.toggle('active',previewing);
  b.textContent=previewing?'■ Stop preview':'▶ Preview flight'; $('pipState').textContent=previewing?'flying':'live'; }
$('btnPreview').addEventListener('click',playToggle);

// read-only speed / height label inside the preview window (no editing here)
// Editable speed / height controls inside the preview, bound to one waypoint.
// While flying/scrubbing this is the NEXT point the camera is heading to; while a
// waypoint is selected it's that waypoint. Re-rendered only when its values change.
let pipShown={dest:-1,level:-1,agl:-1,next:null};
function setPipControls(dest,isNext){
  const el=$('pipInfo'), a=active();
  if(!el||!a||!a.nodes[dest]){ if(el) el.style.display='none'; pipShown={dest:-1,level:-1,agl:-1,next:null}; return; }
  const n=a.nodes[dest];
  el.style.display='flex';
  if(pipShown.dest===dest && pipShown.level===n.speed && pipShown.agl===n.agl && pipShown.next===isNext) return;
  pipShown={dest,level:n.speed,agl:n.agl,next:isNext};
  const wp=dest+1;
  const sLab=isNext ? `Speed to Next Waypoint (${wp})` : `Speed of Waypoint (${wp})`;
  const hLab=isNext ? `Height of Next Waypoint (${wp})` : `Height of Waypoint (${wp})`;
  el.innerHTML =
    `<span class="pipCtl"><span class="pipLbl">${sLab}</span>`+
      `<span class="spd" id="pipSpd" title="Click to cycle, drag to change">${speedChevrons(n.speed)}</span></span>`+
    `<span class="pipCtl"><span class="pipLbl">${hLab}</span>`+
      `<span class="hgt"><button class="hb" id="pipHm">−</button><span class="hv" id="pipHv" title="Drag up/down to change height">${n.agl} m</span><button class="hb" id="pipHp">+</button></span></span>`;
  attachSpeedScrub($('pipSpd'), a.id, dest, 'pip');
  $('pipHm').onclick=()=>{ applyEditFor(a.id,dest,'agl',a.nodes[dest].agl-HEIGHT_STEP); wizardNotify('pipAdjust'); };
  $('pipHp').onclick=()=>{ applyEditFor(a.id,dest,'agl',a.nodes[dest].agl+HEIGHT_STEP); wizardNotify('pipAdjust'); };
  attachHeightScrub($('pipHv'), a.id, dest, 'pip');
}
// Which waypoints an edit on `base` affects — mirrors applyEdit: an active
// multi-selection edits the set, otherwise only that node.
function editTargets(p, base, prop){
  return nodesFor(p, base);
}
// Rebuild everything except the container holding the handle being dragged, so the
// drag isn't interrupted. `where` = 'pip' | 'gizmo' | 'panel'.
function partialRefreshExcept(where){
  rebuildPath(); rebuildCommitted(); renderTimeline();
  if(where!=='panel') renderPanel();
  if(where!=='gizmo') buildGizmos();
}
// Click-drag a height readout up/down to change it, relative to where you grabbed.
// One undo per drag.
function attachHeightScrub(hvEl, pathId, idx, where){
  if(!hvEl) return;
  hvEl.onpointerdown=ev=>{
    ev.preventDefault(); ev.stopPropagation();
    const p=paths.find(x=>x.id===pathId); if(!p||!p.nodes[idx]) return;
    pushHistory();
    const run=editTargets(p,idx,'agl');           // group fixed once so the run stays stable
    const startY=ev.clientY, startAgl=p.nodes[idx].agl;
    const mv=e2=>{
      const steps=Math.round((startY-e2.clientY)/6);   // up = higher, ~6px per 20 m step
      const newAgl=Math.max(HEIGHT_MIN,Math.min(HEIGHT_MAX,startAgl+steps*HEIGHT_STEP));
      if(newAgl===p.nodes[idx].agl) return;
      run.forEach(j=>writeProp(p.nodes[j],'agl',newAgl,j));
      partialRefreshExcept(where);
      if(where==='pip'){ pipShown.agl=newAgl; wizardNotify('pipAdjust'); }   // keep animate from rebuilding the pip control
      hvEl.textContent=newAgl+' m';
    };
    const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); refreshAll(); };
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
  };
}
// Speed control: click still cycles 1→5→1; drag left/right changes the level
// (right = faster), relative to where you grabbed. One undo per drag.
function attachSpeedScrub(spEl, pathId, idx, where){
  if(!spEl) return;
  spEl.onpointerdown=ev=>{
    ev.preventDefault(); ev.stopPropagation();
    const p=paths.find(x=>x.id===pathId); if(!p||!p.nodes[idx]) return;
    const startX=ev.clientX, startSpeed=p.nodes[idx].speed;
    let moved=false, didHistory=false, run=null;
    const mv=e2=>{
      if(Math.abs(e2.clientX-startX)>3) moved=true;
      const steps=Math.round((e2.clientX-startX)/14);   // ~14px per level
      const newSpeed=Math.max(1,Math.min(5,startSpeed+steps));
      if(newSpeed===p.nodes[idx].speed) return;
      if(!didHistory){ pushHistory(); didHistory=true; run=editTargets(p,idx,'speed'); }
      run.forEach(j=>writeProp(p.nodes[j],'speed',newSpeed,j));
      partialRefreshExcept(where);
      if(where==='pip'){ pipShown.level=newSpeed; wizardNotify('pipAdjust'); }
      spEl.innerHTML=speedChevrons(newSpeed);
    };
    const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up);
      if(!moved) applyEditFor(pathId, idx, 'speed', (p.nodes[idx].speed%5)+1);   // tap = cycle
      else refreshAll();
    };
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
  };
}

// Add a waypoint without clicking the map: drops one a short step from the last
// (or at the view centre for the first), so testers can build a path quickly.
function addWaypointAtCentre(){
  let a=active(); if(!a){ addPath(); a=active(); }
  const prev=a.nodes[a.nodes.length-1];
  const x = prev ? prev.dronePos.x+160 : camCentre.x;
  const z = prev ? prev.dronePos.z+160 : camCentre.z;
  const agl  = prev ? prev.agl  : DEFAULT_AGL;
  const speed= prev ? prev.speed: 2;
  const target = prev && prev.target ? prev.target.clone() : null;
  const targetAgl = prev ? (prev.targetAgl||0) : 0;
  pushHistory();
  a.nodes.push({ dronePos:new THREE.Vector3(x,terrainHeightAt(x,z)+agl,z), target, targetAgl, speed, agl });
  selectNode(a.nodes.length-1,false);
  camGoal.set(x,0,z); refreshAll();
  wizardNotify('waypointPlaced', a.nodes.length);
}

function openTimeModal(){
  if(!motion) return;
  const base=motion.total;                          // seconds at scale 1 (from per-node speeds)
  const minT=Math.max(5, base*0.3), maxT=base*3;
  let val=Math.min(maxT,Math.max(minT, base*timeScale));
  modalCard.className='modalCard';
  modalCard.innerHTML =
    '<h3>Adjust total flight time</h3>'+
    '<p>Drag up for a longer, slower flight or down for a shorter, faster one. Every leg stretches evenly, so the relative speeds you set per waypoint are kept.</p>'+
    '<p class="hint">We recommend 90 to 120 seconds for long shots, under 20 seconds for something short.</p>'+
    '<div class="timeBody">'+
      '<div class="timeLabels"><span>Longer</span><span>Shorter</span></div>'+
      '<div class="timeTrack" id="tTrack"><div class="timeFill" id="tFill"></div><div class="timeHandle" id="tHandle"></div></div>'+
      '<div class="timeReadout"><div class="big" id="tBig">0:00</div><div class="sub">new total time<br>currently <span id="tNow"></span></div></div>'+
    '</div>'+
    '<div class="modalBtns"><button id="tCancel">Cancel</button><button class="primary" id="tApply">Confirm</button></div>';
  const track=$('tTrack'), fill=$('tFill'), handle=$('tHandle'), big=$('tBig');
  $('tNow').textContent=fmtTime(base*timeScale);
  function render(){ const f=(maxT-val)/(maxT-minT);
    handle.style.top=(f*100)+'%'; fill.style.height=((1-f)*100)+'%'; big.textContent=fmtTime(val); }
  render();
  let dragging=false;
  function setFromY(y){ const r=track.getBoundingClientRect(); let f=(y-r.top)/r.height; f=Math.max(0,Math.min(1,f)); val=maxT-(maxT-minT)*f; render(); }
  track.addEventListener('pointerdown',e=>{ dragging=true; track.setPointerCapture(e.pointerId); setFromY(e.clientY); });
  track.addEventListener('pointermove',e=>{ if(dragging) setFromY(e.clientY); });
  track.addEventListener('pointerup',()=>{ dragging=false; });
  $('tCancel').onclick=closeModal;
  $('tApply').onclick=()=>{ pushHistory(); timeScale=val/base; closeModal(); rebuildPath(); wizardNotify('timeScaled'); };
  modalWrap.classList.add('show'); modalOpen=true;
}

// Bottom node bar: x = playback time, segments coloured/chevroned by speed,
// dots select waypoints, and a draggable playhead scrubs the preview camera.
let tlTotal=0, tlTrackW=0; const tlPad=16;
function renderTimeline(){
  const tl=$('timeline'); if(!tl) return;
  const a=active();
  tl.innerHTML='';
  if(!a || a.nodes.length<2 || !motion){ tl.style.display='none'; tlTotal=0; return; }
  tl.style.display='flex';
  const N=a.nodes.length, M=motion.M, total=motion.total*timeScale; tlTotal=total;
  const nodeTime=k=> motion.cum[Math.round(k/(N-1)*M)]*timeScale;

  const play=document.createElement('button'); play.className='tlPlay'+(previewing?' playing':'');
  play.innerHTML = previewing ? '❚❚' : '▶';
  play.title = previewing ? 'Pause' : 'Play from the playhead / selected point';
  play.onclick=()=>playToggle();
  tl.appendChild(play);

  const scroll=document.createElement('div'); scroll.className='tlScroll';
  const track=document.createElement('div'); track.className='tlTrack';
  scroll.appendChild(track); tl.appendChild(scroll);

  const tbtn=document.createElement('button'); tbtn.className='tlTime'; tbtn.id='tlTimeBtn';
  tbtn.innerHTML='◷ '+fmtTime(total); tbtn.title='Total flight time, click to adjust';
  tbtn.onclick=()=>{ if(!modalOpen) openTimeModal(); };
  tl.appendChild(tbtn);

  const cw = scroll.clientWidth || (innerWidth-160);
  const trackW = cw; tlTrackW=trackW;            // scale to fit every waypoint inside the window
  track.style.width=trackW+'px';
  const X=t=> total>0 ? tlPad + (t/total)*(trackW-2*tlPad) : tlPad;

  for(let i=0;i<N-1;i++){
    const t0=nodeTime(i), t1=nodeTime(i+1), lv=a.nodes[i+1].speed;
    const colHex='#'+speedColour(lv).toString(16).padStart(6,'0');
    const seg=document.createElement('div'); seg.className='tlSeg';
    seg.style.left=X(t0)+'px'; seg.style.width=Math.max(2,X(t1)-X(t0))+'px'; seg.style.background=colHex;
    track.appendChild(seg);
    const ch=document.createElement('div'); ch.className='tlChev';
    ch.style.left=((X(t0)+X(t1))/2)+'px'; ch.style.color=colHex; ch.textContent='▸'.repeat(lv);
    track.appendChild(ch);
  }
  for(let k=0;k<N;k++){
    const sel=(k===selectedNode||selection.has(k));
    const dot=document.createElement('div'); dot.className='tlDot'+(sel?' sel':'');
    dot.style.left=X(nodeTime(k))+'px'; dot.title='Waypoint '+(k+1);
    dot.onpointerdown=e=>e.stopPropagation();
    dot.onclick=e=>{ e.stopPropagation(); selectNode(k, e.shiftKey);
      const n=a.nodes[k]; camGoal.set(n.dronePos.x,0,n.dronePos.z); refreshAll(); };
    track.appendChild(dot);
    const num=document.createElement('div'); num.className='tlNum'; num.style.left=X(nodeTime(k))+'px'; num.textContent=k+1;
    track.appendChild(num);
  }
  // when idle, park the playhead on the selected waypoint so Play starts from there
  if(!previewing && !scrubbing && selectedNode>=0) previewTime = Math.min(nodeTime(selectedNode), total);
  const head=document.createElement('div'); head.className='tlHead'; head.id='tlHead';
  head.style.left=X(Math.min(previewTime,total))+'px'; track.appendChild(head);

  // end-of-flight marker: grab and drag to scale the whole flight time (left = compress, right = stretch)
  const endH=document.createElement('div'); endH.className='tlEnd'; endH.id='tlEnd';
  endH.textContent='↔'; endH.title='Drag to scale the whole flight time';
  endH.style.left=X(total)+'px';
  endH.addEventListener('pointerdown',e=>{ e.stopPropagation(); beginTimelineScale(e, track, trackW, total); });
  track.appendChild(endH);

  track.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('tlDot')) return;
    beginScrub(e, track, trackW, total);
  });
}
// Drag the timeline end marker to rescale the whole flight; release raises a confirm.
function beginTimelineScale(e, track, trackW, total){
  const base=motion.total;                       // unscaled seconds (per-node speeds)
  const pxPerSec=(trackW-2*tlPad)/Math.max(total,1e-6);
  const minT=Math.max(5, base*0.2), maxT=base*4;
  let newTotal=total;
  const apply=ev=>{
    const r=track.getBoundingClientRect();
    newTotal=Math.max(minT, Math.min(maxT, (ev.clientX-r.left-tlPad)/pxPerSec));
    const endH=$('tlEnd'); if(endH) endH.style.left=(tlPad+newTotal*pxPerSec)+'px';
    const tb=$('tlTimeBtn'); if(tb) tb.innerHTML='◷ '+fmtTime(newTotal);
  };
  apply(e);
  const mv=ev=>apply(ev);
  const up=()=>{
    window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up);
    if(Math.abs(newTotal-total)<0.5){ renderTimeline(); return; }   // negligible move, snap back
    showModal({ title:'Scale flight time',
      body:`Scale timeline from ${fmtTimeWords(total)} to ${fmtTimeWords(newTotal)}? Every leg stretches evenly, so the relative speeds you set per waypoint are kept.`,
      buttons:[ {label:'Cancel', onClick:renderTimeline},
                {label:'Confirm', kind:'primary', onClick:()=>{ pushHistory(); timeScale=newTotal/base; rebuildPath(); wizardNotify('timeScaled'); }} ] });
  };
  window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
}
function beginScrub(e,track,trackW,total){
  previewing=false; scrubbing=true; setPreviewBtn();
  const apply=ev=>{ const r=track.getBoundingClientRect(); let f=(ev.clientX-r.left-tlPad)/(trackW-2*tlPad); f=Math.max(0,Math.min(1,f));
    previewTime=f*total; const head=$('tlHead'); if(head) head.style.left=(tlPad+f*(trackW-2*tlPad))+'px'; };
  apply(e);
  const mv=ev=>apply(ev);
  const up=()=>{ scrubbing=false; window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); };
  window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
}
function updatePlayhead(t){ const head=$('tlHead'); if(head && tlTotal>0) head.style.left=(tlPad+(t/tlTotal)*(tlTrackW-2*tlPad))+'px'; }
// Play / pause. Resumes from the current playhead, which renderTimeline parks on
// the scrubbed position or the selected waypoint — so playback starts from there.
function playToggle(){
  const a=active(); if(!a||a.nodes.length<2||!motion) return;
  previewing=!previewing; if(previewing) scrubbing=false;
  setPreviewBtn(); renderTimeline();
  if(previewing) wizardNotify('previewStart');
}

// ============================ LOOP ============================
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  camCentre.lerp(camGoal,1-Math.pow(0.0015,dt)); placeMapCam();

  updateArrows(dt);
  syncGizmos();
  if(typeof wizardTick==='function') wizardTick();

  // The preview window shows the live flight (playing or scrubbed) or the selected
  // waypoint's point-of-view, with editable speed/height for the relevant waypoint.
  const a=active();
  let showPip=false; camMarker.visible=false;
  if((previewing||scrubbing) && motion && droneCurve && a){
    if(previewing){ const total=motion.total*timeScale; previewTime=(previewTime+dt)%total; }
    const param=motionSample(previewTime);
    const cp=droneCurve.getPoint(param); pipCam.position.copy(cp);
    const tg=targetAtParam(param); pipCam.lookAt(tg.x,tg.y,tg.z);
    updateCamMarker(cp,tg);
    const N=a.nodes.length, x=Math.min(param*(N-1),N-1-1e-6), i=Math.floor(x);
    setPipControls(Math.min(N-1,i+1), true);
    updatePlayhead(previewTime); showPip=true;
  } else if(selectedNode>=0 && a && a.nodes[selectedNode]){
    const n=a.nodes[selectedNode];
    pipCam.position.copy(n.dronePos);
    const t=resolvedTarget(selectedNode); pipCam.lookAt(t.x,t.y,t.z);
    setPipControls(selectedNode, false); showPip=true;
  }

  // red sight line from the selected waypoint to its look-at location
  if(!previewing && !scrubbing && selectedNode>=0 && a && a.nodes[selectedNode]){
    const n=a.nodes[selectedNode], t=resolvedTarget(selectedNode);
    lookatGeo.setFromPoints([n.dronePos.clone(), new THREE.Vector3(t.x,t.y+2,t.z)]);
    lookatGeo.attributes.position.needsUpdate=true;
    lookatLine.visible=true;
    // suggestion ring only on Targeted paths (Fixed frames nadir, no target to drop)
    if(a.cameraType==='targeted'){
      suggestRing.position.set(n.dronePos.x, terrainHeightAt(n.dronePos.x,n.dronePos.z)+2, n.dronePos.z);
      suggestRing.visible=true;
    } else suggestRing.visible=false;
  } else { lookatLine.visible=false; suggestRing.visible=false; }

  const pf=$('pipFrame');
  pf.style.display = showPip ? 'block' : 'none';
  if(!showPip){ const pi=$('pipInfo'); if(pi) pi.style.display='none'; }
  $('pipState').textContent = previewing ? 'flying' : (scrubbing ? 'scrub' : 'live');

  renderer.setRenderTarget(lightRT); renderer.setClearColor(0x000000,1); renderer.clear();
  renderer.render(lightScene,lightCam); renderer.setRenderTarget(null);

  renderer.setClearColor(HORIZON,1); renderer.setViewport(0,0,innerWidth,innerHeight);
  renderer.setScissorTest(false); renderer.render(scene,mapCam);

  if(pf.style.display==='block'){
    const r=pf.getBoundingClientRect();
    const vx=r.left, vy=innerHeight-r.bottom, vw=r.width, vh=r.height;   // GL origin is bottom-left
    pipCam.aspect=vw/vh; pipCam.updateProjectionMatrix();
    // Clean preview by default: hide the flight path and authoring markers so the
    // preview reads like the real camera output. Ctrl or the reveal toggle shows them.
    const reveal = revealPreview || ctrlDown;
    const pgV=pathGroup.visible, mgV=markerGroup.visible;
    if(!reveal){ pathGroup.visible=false; markerGroup.visible=false; }
    renderer.setScissorTest(true); renderer.setViewport(vx,vy,vw,vh); renderer.setScissor(vx,vy,vw,vh);
    renderer.render(scene,pipCam); renderer.setScissorTest(false);
    pathGroup.visible=pgV; markerGroup.visible=mgV;
  }
}

    droneRise: svg(ground()+
      `<g class="wlRise">${drone(150,44)}<rect x="142" y="52" width="16" height="6" fill="none" stroke="${DIMC}" stroke-width="1.5"/><rect x="142" y="60" width="16" height="6" fill="none" stroke="${DIMC}" stroke-width="1.5"/></g>`+
      `<line x1="180" y1="40" x2="180" y2="74" stroke="${GREEN}" stroke-width="2"/>`+
      `<path d="M176 46 L180 40 L184 46" fill="none" stroke="${GREEN}" stroke-width="2"/>`+
      `<rect x="14" y="20" width="34" height="16" rx="3" fill="none" stroke="${DIMC}" stroke-width="2" class="wlBlink"/>`+
      `<text x="31" y="32" fill="${DIMC}" font-size="9" font-family="monospace" text-anchor="middle">CTRL</text>`),
    previewTune: svg(`<rect x="40" y="14" width="220" height="58" rx="5" fill="none" stroke="${DIMC}" stroke-width="2"/>`+
      drone(95,40)+`<line x1="103" y1="42" x2="180" y2="42" stroke="${BLUE}" stroke-width="2" class="wlDash"/>`+target(185,42)+
      `<rect x="55" y="80" width="80" height="16" rx="3" fill="none" stroke="${BLUE}" stroke-width="2" class="wlBlink"/>`+
      `<text x="95" y="92" fill="${BLUE}" font-size="9" font-family="monospace" text-anchor="middle">SPEED</text>`+
      `<rect x="165" y="80" width="80" height="16" rx="3" fill="none" stroke="${BLUE}" stroke-width="2"/>`+
      `<text x="205" y="92" fill="${BLUE}" font-size="9" font-family="monospace" text-anchor="middle">HEIGHT</text>`),
    reorder: svg(`<g class="wlSwap"><rect x="80" y="20" width="140" height="22" rx="4" fill="none" stroke="${BLUE}" stroke-width="2"/>`+
      `<text x="92" y="35" fill="${BLUE}" font-size="11" font-family="monospace">⠿ Waypoint 01</text></g>`+
      `<rect x="80" y="50" width="140" height="22" rx="4" fill="none" stroke="${DIMC}" stroke-width="2"/>`+
      `<text x="92" y="65" fill="${DIMC}" font-size="11" font-family="monospace">⠿ Waypoint 02</text>`),
    trash: svg(`<rect x="70" y="34" width="160" height="24" rx="4" fill="none" stroke="${DIMC}" stroke-width="2" class="wlBlink"/>`+
      `<text x="84" y="50" fill="${DIMC}" font-size="11" font-family="monospace">Waypoint 02</text>`+
      `<g stroke="${RED}" stroke-width="2" fill="none"><line x1="205" y1="40" x2="217" y2="52"/><line x1="217" y1="40" x2="205" y2="52"/></g>`),
    retime: svg(`<line x1="30" y1="52" x2="270" y2="52" stroke="${DIMC}" stroke-width="2"/>`+
      `<circle cx="60" cy="52" r="4" fill="${BLUE}"/><circle cx="120" cy="52" r="4" fill="${BLUE}"/><circle cx="180" cy="52" r="4" fill="${BLUE}"/>`+
      `<g class="wlSlide"><rect x="244" y="40" width="10" height="24" rx="2" fill="none" stroke="${BLUE}" stroke-width="2"/>`+
      `<text x="249" y="34" fill="${BLUE}" font-size="11" text-anchor="middle">↔</text></g>`+
      `<text x="150" y="86" fill="${DIMC}" font-size="12" font-family="monospace" text-anchor="middle">3:14 → 1:20</text>`),
    fixed: svg(ground()+`<g class="wlRise">${drone(150,42)}`+
      `<line x1="150" y1="52" x2="150" y2="80" stroke="${BLUE}" stroke-width="2" stroke-dasharray="4 4"/>`+
      `<path d="M145 74 L150 82 L155 74" fill="none" stroke="${BLUE}" stroke-width="2"/></g>`),
    hat: svg(`<g class="wlRise"><path d="M120 60 L180 60 L168 34 L132 34 Z" fill="none" stroke="${BLUE}" stroke-width="2"/>`+
      `<ellipse cx="150" cy="62" rx="44" ry="7" fill="none" stroke="${BLUE}" stroke-width="2"/>`+
      `<path d="M132 50 Q150 56 168 50" fill="none" stroke="${RED}" stroke-width="2"/></g>`+
      `<circle cx="150" cy="48" r="34" fill="none" stroke="${DIMC}" stroke-width="1.5" stroke-dasharray="3 5" class="wlSpin"/>`)
  };

  // ---- projection helpers for map-anchored spotlights ----
  const _v=new THREE.Vector3();
  function projectWorld(p, w, h){
    if(!p) return null;
    _v.copy(p).project(mapCam); if(_v.z>1) return null;
    const sx=(_v.x*0.5+0.5)*innerWidth, sy=(-_v.y*0.5+0.5)*innerHeight;
    return {left:sx-w/2, top:sy-h/2, width:w, height:h};
  }
  function elRect(id){ const e=$(id); if(!e) return null; const r=e.getBoundingClientRect();
    if(r.width<1&&r.height<1) return null; return {left:r.left, top:r.top, width:r.width, height:r.height}; }
  function selNode(){ const a=active(); return a&&a.nodes.length ? (selectedNode>=0?selectedNode:0) : -1; }

  // ---- step definitions (copy is verbatim from the approved deck) ----
  const steps=[
    { key:'welcome', art:'hat', mode:'center', choose:true,
      copy:"Welcome! Let's build a camera flight together. We'll make a Targeted camera - one that follows a path and looks at points you choose." },
    { key:'placeWp1', art:'drop120', mode:'soft',
      copy:"Tap to place where your camera drone will sit in the sky. It'll be created at a comfortable 120 m above the ground.",
      hint:"Click an empty spot on the map.",
      events:['waypointPlaced'], ready:()=>active()&&active().nodes.length>=1 },
    { key:'fixedInsert', art:'fixed', mode:'center', explanatory:true, show:()=>st.camType==='fixed',
      copy:"A Fixed camera keeps a steady downward framing as it flies, so there's no separate target to set - just place where it should travel." },
    { key:'lookAt1', art:'cone', mode:'soft', show:()=>st.camType!=='fixed',
      copy:"Now, tap to place where you want your camera drone to look.",
      hint:"Right-click and drag on the map to aim the look-at.",
      events:['targetSet'], ready:()=>{ const a=active(); return a&&a.nodes[0]&&a.nodes[0].target; } },
    { key:'placeWp2', art:'pathExtend', mode:'soft',
      copy:"Now tap to set the next waypoint your drone will fly to.",
      hint:"Click another empty spot on the map.",
      events:['waypointPlaced'], ready:()=>active()&&active().nodes.length>=2 },
    { key:'lookAt2', art:'cone', mode:'soft', show:()=>st.camType!=='fixed',
      copy:"Good. Now again, click to place where you want your drone to look when it's at this point.",
      hint:"Right-click and drag to aim this waypoint's look-at.",
      events:['targetSet'], ready:()=>{ const a=active(); return a&&a.nodes[1]&&a.nodes[1].target; } },
    { key:'toThree', art:'rhythm', mode:'soft',
      copy:"Let's do that a few more times.",
      hint:()=> st.camType==='fixed' ? "Place a third waypoint on the map." : "Place a third waypoint and aim its look-at.",
      events:['waypointPlaced','targetSet'],
      ready:()=>{ const a=active(); return a&&a.nodes.length>=3 && (a.cameraType==='fixed' || (a.nodes[2]&&a.nodes[2].target)); } },
    { key:'raiseTarget', art:'targetRise', mode:'ring', show:()=>st.camType!=='fixed',
      copy:"You can adjust the height above the ground of where your drone is looking by holding CTRL.",
      hint:"Lift a target with its height + / − (or drag its height).",
      anchor:()=>{ const a=active(); if(!a) return null; const i=selNode(); const n=a.nodes[i]; const t=(n&&n.target)|| (a.nodes.find(x=>x.target)||{}).target; return projectWorld(t,150,116); },
      events:['targetHeight'], ready:()=>{ const a=active(); return a&&a.nodes.some(n=>n.target&&(n.targetAgl||0)>0); } },
    { key:'raiseWaypoint', art:'droneRise', mode:'ring',
      copy:"CTRL also lets you change the height of your waypoints. Give it a shot.",
      hint:"Change a waypoint's height with its + / − (or drag the height).",
      anchor:()=>{ const a=active(); if(!a) return null; const i=selNode(); const n=a.nodes[i]||a.nodes[0]; return n?projectWorld(n.dronePos,150,120):null; },
      events:['waypointHeight'], ready:()=>true },
    { key:'tuneOnFly', art:'previewTune', mode:'ring',
      copy:"One of the easiest ways to adjust a camera is on the fly. The Speed and Height buttons change the speed to the next waypoint and the height of the next waypoint - try it while previewing live.",
      hint:()=> st.previewSeen ? "Drag Speed or Height in the preview bar." : "Press ▶ Preview flight to start.",
      anchor:()=> st.previewSeen ? elRect('pipInfo') : elRect('btnPreview'),
      events:['pipAdjust'], ready:()=>st.previewSeen },
    { key:'reorder', art:'reorder', mode:'ring',
      copy:"Good! Now let's shift a waypoint's order in the layers. Try dragging one above another - they run in sequence, top to bottom.",
      hint:"Drag a waypoint row in the left panel above another.",
      anchor:()=>panelRowRect(), events:['reorder'], ready:()=>true },
    { key:'deleteWp', art:'trash', mode:'ring',
      copy:"Okay, now delete one by pressing the TRASH icon. You can also hold CTRL to edit or delete waypoints right in the map view.",
      hint:"Press × on a waypoint row (or 🗑 on its map gizmo).",
      anchor:()=>panelTrashRect(), events:['waypointDeleted'], ready:()=>true },
    { key:'retime', art:'retime', mode:'ring',
      copy:"You're getting the hang of this! Let's change the overall time and speed the whole thing up. We recommend 90 to 120 seconds for long shots, and under 20 seconds for something short.",
      hint:"Drag the timeline's ↔ end marker, or click the total time.",
      anchor:()=> elRect('tlEnd')||elRect('tlTimeBtn'), events:['timeScaled'], ready:()=>true },
    { key:'wrapUp', art:'hat', mode:'ring', explanatory:true, done:true,
      copy:"Okay, I think you've got this! If you want to run through the wizard again, just press the wizard-hat button. Good luck!",
      anchor:()=> elRect('btnWizard') }
  ];
  function panelRowRect(){ const r=document.querySelector('#pathScroll .pathRow.active .wp:not(.empty)'); if(!r) return null;
    const b=r.getBoundingClientRect(); return {left:b.left, top:b.top, width:b.width, height:b.height}; }
  function panelTrashRect(){ const r=document.querySelector('#pathScroll .pathRow.active .wp:not(.empty) .iconBtn.del'); if(!r) return null;
    const b=r.getBoundingClientRect(); return {left:b.left-3, top:b.top-3, width:b.width+6, height:b.height+6}; }

  function visible(){ return steps.filter(s=>!s.show || s.show()); }
  function cur(){ return steps[idx]; }

  // ---- DOM ----
  function build(){
    if(built) return; built=true;
    dim=document.createElement('div'); dim.id='wizDim';
    ring=document.createElement('div'); ring.id='wizRing';
    card=document.createElement('div'); card.id='wizCard';
    document.body.append(dim,ring,card);
    window.addEventListener('resize',()=>{ if(running) layout(); });
  }

  function render(){
    const s=cur(); if(!s) return;
    const vis=visible(); const pos=vis.indexOf(s)+1, total=vis.length;
    const hint = typeof s.hint==='function' ? s.hint() : s.hint;
    let foot;
    if(s.choose){
      foot=`<div class="wizChoose"><button class="wizNext" data-act="targeted">Targeted</button>`+
           `<button class="wizNext ghost" data-act="fixed">Fixed</button></div>`;
    } else if(s.explanatory){
      foot=`<button class="wizNext" data-act="next">${s.done?'Done':'Next'}</button>`;
    } else {
      foot=hint?`<div class="wizDo">${hint}</div>`:'';
    }
    card.innerHTML =
      `<div class="wizArt">${WIRE[s.art]||''}</div>`+
      `<div class="wizCopy">${s.copy}</div>`+
      foot+
      `<div class="wizFoot"><span class="wizStep">${pos} / ${total}</span>`+
        (s.choose||s.explanatory?'':`<span style="flex:1"></span>`)+
        `<button class="wizSkip" data-act="skip">Skip tour</button></div>`;
    card.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>{
      const a=b.getAttribute('data-act');
      if(a==='skip') finish(false);
      else if(a==='next') advance();
      else if(a==='targeted'||a==='fixed') choose(a);
    });
    layout();
  }

  function choose(type){
    st.camType=type;
    // clean slate, then create the chosen path so Step 1 actually builds it
    paths.length=0; pathSeq=0; activeId=null; clearSelection();
    previewing=false; scrubbing=false; setPreviewBtn();
    $('pipFrame').style.display='none'; timeScale=1; camGoal.set(0,0,0);
    addPath(type);
    advance();
  }

  function clampN(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
  function placeCard(rect){
    const cw=card.offsetWidth||330, ch=card.offsetHeight||220, m=14, topBar=56, vw=innerWidth, vh=innerHeight;
    let x,y;
    if(!rect){ x=(vw-cw)/2; y=clampN((vh-ch)/2, topBar+8, vh-ch-m); }
    else {
      const cx=rect.left+rect.width/2;
      const cand=[
        {x:cx-cw/2, y:rect.top+rect.height+m, ok:rect.top+rect.height+m+ch<vh-m},
        {x:cx-cw/2, y:rect.top-ch-m,           ok:rect.top-ch-m>topBar},
        {x:rect.left+rect.width+m, y:rect.top+rect.height/2-ch/2, ok:rect.left+rect.width+m+cw<vw-m},
        {x:rect.left-cw-m,         y:rect.top+rect.height/2-ch/2, ok:rect.left-cw-m>m}
      ];
      const p=cand.find(c=>c.ok)||{x:cx-cw/2, y:vh-ch-m};
      x=p.x; y=p.y;
    }
    card.style.left=clampN(x,m,vw-cw-m)+'px';
    card.style.top =clampN(y,topBar+6,vh-ch-m)+'px';
  }

  function layout(){
    const s=cur(); if(!s) return;
    let rect = s.anchor ? s.anchor() : null;
    curRect=rect;
    if(s.mode==='center' || (s.mode==='soft')){
      ring.classList.remove('show');
      dim.classList.add('show'); dim.classList.toggle('soft', s.mode==='soft');
      if(s.mode==='soft') placeSoft(); else placeCard(null);
    } else { // ring
      dim.classList.remove('show','soft');
      if(rect){
        const pad=10;
        ring.style.left=(rect.left-pad)+'px'; ring.style.top=(rect.top-pad)+'px';
        ring.style.width=(rect.width+2*pad)+'px'; ring.style.height=(rect.height+2*pad)+'px';
        ring.classList.add('show','pulse'); ring.classList.remove('full');
        placeCard(rect);
      } else {
        // anchor not ready yet: keep the card usable with a light veil, retry next frame
        ring.classList.remove('show');
        dim.classList.add('show','soft');
        placeSoft();
      }
    }
  }
  function placeSoft(){
    const cw=card.offsetWidth||330, m=14, vw=innerWidth;
    card.style.left=clampN((vw-cw)/2, m, vw-cw-m)+'px';
    card.style.top='72px';
  }

  // ---- per-frame: keep the ring glued to moving map anchors ----
  function tick(){
    if(!running) return;
    const s=cur(); if(!s || s.mode!=='ring' || !s.anchor) return;
    const r=s.anchor();
    if(!r){ if(curRect){ curRect=null; layout(); } return; }
    if(!curRect){ layout(); return; }
    const pad=10;
    ring.style.left=(r.left-pad)+'px'; ring.style.top=(r.top-pad)+'px';
    ring.style.width=(r.width+2*pad)+'px'; ring.style.height=(r.height+2*pad)+'px';
    ring.classList.add('show'); dim.classList.remove('show','soft');
    // only re-place the card if the anchor moved a long way (avoids jitter)
    const moved=Math.abs((r.left+r.width/2)-(curRect.left+curRect.width/2))+Math.abs((r.top+r.height/2)-(curRect.top+curRect.height/2));
    if(moved>60){ placeCard(r); }
    curRect=r;
  }

  // ---- advance / events ----
  function advance(){
    const vis=visible(); const here=vis.indexOf(cur());
    const next=vis[here+1];
    if(!next){ finish(true); return; }
    idx=steps.indexOf(next);
    // briefly fade the card so the move reads as a new step
    card.classList.remove('show'); requestAnimationFrame(()=>{ render(); card.classList.add('show'); });
  }
  function onEvent(type){
    if(!running) return;
    if(type==='previewStart'){ st.previewSeen=true; if(cur()&&cur().key==='tuneOnFly') render(); }
    const s=cur(); if(!s || s.choose || s.explanatory) return;
    if(!s.events || s.events.indexOf(type)<0) return;
    if(s.ready && !s.ready()) return;
    advance();
  }

  function start(){
    build();
    running=true; idx=0; st={camType:null, previewSeen:false};
    if(modalOpen) closeModal();
    dim.classList.add('show');
    render(); card.classList.add('show');
  }
  function finish(completed){
    running=false;
    if(card) card.classList.remove('show');
    if(ring) ring.classList.remove('show','pulse');
    if(dim) dim.classList.remove('show','soft');
    try{ localStorage.setItem(DONE_KEY,'1'); }catch(e){}
  }
  function seen(){ try{ return localStorage.getItem(DONE_KEY)==='1'; }catch(e){ return false; } }

  _wizHook=onEvent;
  return { start, tick, seen };
})();
function wizardTick(){ Wizard.tick(); }

// ---------- boot ----------
addPath();          // start with one empty flight path ready to draw
if(Wizard.seen()) showInstructions();   // returning users get the quick reference
else Wizard.start();                    // first run: the guided walkthrough
animate();
</script>
