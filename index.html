<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEAAR · Flight Path Authoring Mock-up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;600&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --vp-red:#ff0037;
    --path-blue:#3da9ff;
    --ink:#e8ecef;
    --dim:#9aa4ac;
    --panel:rgba(12,16,20,.84);
    --panel-solid:#0d1116;
    --panel-line:rgba(255,255,255,.14);
    --green:#3ddc84;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#16222e;
    font-family:'Roboto',system-ui,sans-serif;color:var(--ink);}
  #scene{position:fixed;inset:0;cursor:crosshair;touch-action:none;}
  .hud{position:fixed;z-index:10;pointer-events:none;}
  .hud .clickable{pointer-events:auto;}

  /* Top bar */
  #topbar{top:0;left:0;right:0;display:flex;align-items:center;gap:14px;z-index:12;height:46px;
    padding:0 16px;background:rgba(10,13,17,.94);border-bottom:1px solid var(--panel-line);}
  #brand{font-family:'Antonio',sans-serif;font-size:20px;letter-spacing:.06em;
    text-transform:uppercase;display:flex;align-items:baseline;gap:10px;
    min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  #brand .accent{color:var(--vp-red);}
  #brand small{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--dim);
    letter-spacing:.08em;text-transform:none;}
  #phase{margin-left:auto;flex:none;font-family:'Roboto Mono',monospace;font-size:10px;
    color:var(--ink);letter-spacing:.12em;background:rgba(12,16,20,.8);
    border:1px solid var(--panel-line);border-radius:4px;padding:5px 9px;white-space:nowrap;}

  /* Prompt pill */
  #prompt{top:56px;left:50%;transform:translateX(-50%);box-sizing:border-box;
    background:var(--panel);border:1px solid var(--panel-line);
    border-left:3px solid var(--path-blue);z-index:11;
    padding:10px 18px;border-radius:4px;font-size:14px;
    max-width:min(560px, calc(100vw - 32px));text-align:center;
    backdrop-filter:blur(6px);transition:border-left-color .2s;}
  #prompt.target-mode{border-left-color:var(--vp-red);}
  #prompt.done-mode{border-left-color:var(--green);}
  #prompt b{font-weight:700;}
  #prompt .sub{display:block;font-size:11px;color:var(--dim);margin-top:3px;
    font-family:'Roboto Mono',monospace;}

  /* Readout */
  #readout{top:54px;left:16px;background:var(--panel);border:1px solid var(--panel-line);
    border-radius:4px;padding:10px 12px;font-family:'Roboto Mono',monospace;
    font-size:11px;line-height:1.7;color:var(--dim);min-width:150px;}
  #readout .v{color:var(--ink);}
  #readout .label{font-family:'Antonio',sans-serif;font-size:13px;letter-spacing:.1em;
    color:var(--ink);text-transform:uppercase;margin-bottom:4px;}

  /* Flight path layer panel */
  #paths{top:54px;right:16px;width:300px;max-width:calc(100vw - 32px);max-height:64vh;
    display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:4px;
    backdrop-filter:blur(6px);overflow:hidden;}
  #paths .head{display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-bottom:1px solid var(--panel-line);}
  #paths .head .label{font-family:'Antonio',sans-serif;font-size:14px;letter-spacing:.1em;
    text-transform:uppercase;}
  #paths .scroll{overflow-y:auto;}
  .addPath{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-line);
    background:transparent;color:var(--ink);border-radius:4px;width:26px;height:26px;
    font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .addPath:hover{border-color:var(--path-blue);color:var(--path-blue);}

  .pathRow{border-bottom:1px solid rgba(255,255,255,.07);}
  .pathHead{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;
    pointer-events:auto;}
  .pathRow.active .pathHead{background:rgba(61,169,255,.1);}
  .swatch{width:11px;height:11px;border-radius:2px;flex:none;}
  .pathName{flex:1;background:transparent;border:none;color:var(--ink);font-size:13px;
    font-weight:500;font-family:'Roboto',sans-serif;padding:2px 3px;border-radius:3px;
    pointer-events:auto;min-width:0;text-overflow:ellipsis;}
  .pathName:focus{outline:none;background:rgba(255,255,255,.1);}
  .pathMeta{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--dim);flex:none;}
  .iconBtn{pointer-events:auto;cursor:pointer;border:none;background:transparent;
    color:var(--dim);font-size:13px;line-height:1;padding:3px 5px;border-radius:3px;flex:none;}
  .iconBtn:hover{color:var(--ink);background:rgba(255,255,255,.08);}
  .iconBtn.del:hover{color:var(--vp-red);}
  .caret{font-size:9px;color:var(--dim);width:10px;transition:transform .15s;}
  .pathRow.collapsed .caret{transform:rotate(-90deg);}
  .pathRow.collapsed .wpList{display:none;}

  .wpList{padding:2px 0 6px 0;}
  .wp{display:flex;align-items:center;gap:7px;padding:6px 10px 6px 14px;
    font-family:'Roboto Mono',monospace;font-size:11px;color:#b6bec5;
    pointer-events:auto;cursor:grab;border-top:1px solid transparent;border-bottom:1px solid transparent;}
  .wp:hover{background:rgba(255,255,255,.04);}
  .wp.dragging{opacity:.4;}
  .wp.drop-before{border-top:2px solid var(--path-blue);}
  .wp.drop-after{border-bottom:2px solid var(--path-blue);}
  .wp .grip{color:#5b646c;font-size:12px;cursor:grab;flex:none;}
  .wp .idx{color:var(--path-blue);font-weight:500;flex:none;}
  .wp .co{flex:1;line-height:1.5;min-width:0;word-break:break-word;}
  .wp .co .tgt{color:var(--vp-red);}
  .wp.empty{color:var(--dim);font-style:italic;cursor:default;justify-content:center;}

  /* PiP */
  #pipFrame{left:16px;bottom:80px;width:340px;height:212px;
    border:1px solid var(--panel-line);border-radius:4px;overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.55);display:none;}
  #pipFrame .pipLabel{position:absolute;top:0;left:0;right:0;display:flex;
    justify-content:space-between;align-items:center;padding:5px 9px;
    background:linear-gradient(180deg,rgba(8,10,13,.78),rgba(8,10,13,0));
    font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.1em;
    color:var(--ink);text-transform:uppercase;}
  #pipFrame .rec{display:inline-flex;align-items:center;gap:5px;color:var(--dim);}
  #pipFrame .rec .dot{width:7px;height:7px;border-radius:50%;background:var(--vp-red);
    animation:blink 1.2s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25;}}

  /* Buttons */
  #actions{right:16px;bottom:80px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  #actions .btn{width:214px;justify-content:flex-start;}
  #actions .btn kbd{margin-left:auto;}
  .btn{pointer-events:auto;background:var(--panel);border:1px solid var(--panel-line);
    color:var(--ink);font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;
    padding:9px 16px;border-radius:4px;cursor:pointer;display:flex;gap:8px;align-items:center;
    backdrop-filter:blur(6px);transition:border-color .15s,background .15s;}
  .btn:hover{border-color:rgba(255,255,255,.4);}
  .btn kbd{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--dim);
    border:1px solid rgba(255,255,255,.2);border-radius:3px;padding:1px 5px;}
  .btn.primary{border-color:var(--path-blue);}
  .btn.danger:hover{border-color:var(--vp-red);}
  .btn.toggle.active{background:rgba(255,210,61,.16);border-color:#ffd23d;}
  .btn.preview{border-color:var(--green);}
  .btn.preview.active{background:rgba(61,220,132,.15);}
  .btn[disabled]{opacity:.4;pointer-events:none;}

  /* Footer help */
  #help{bottom:80px;left:50%;transform:translateX(-50%);
    font-family:'Roboto Mono',monospace;font-size:10.5px;color:var(--dim);
    background:var(--panel);border:1px solid var(--panel-line);border-radius:4px;
    padding:7px 14px;display:flex;gap:16px;white-space:nowrap;}
  #help span b{color:var(--ink);font-weight:500;}

  /* Gizmo layer */
  #gizmoLayer{position:fixed;inset:0;z-index:20;pointer-events:none;}
  .gizmo{position:absolute;width:0;height:0;}
  .gizmo .gz-sq{position:absolute;left:-7px;top:-7px;width:14px;height:14px;
    background:rgba(232,236,239,.9);border:1px solid #0d1116;border-radius:2px;
    cursor:move;pointer-events:auto;}
  .gizmo .gz-x{position:absolute;left:6px;top:-4px;width:34px;height:8px;
    background:#ff4d4d;border-radius:4px;cursor:ew-resize;pointer-events:auto;
    box-shadow:0 0 0 1px rgba(0,0,0,.4);}
  .gizmo .gz-x::after{content:'';position:absolute;right:-7px;top:-3px;
    border-left:8px solid #ff4d4d;border-top:7px solid transparent;border-bottom:7px solid transparent;}
  .gizmo .gz-y{position:absolute;left:-4px;top:-40px;width:8px;height:34px;
    background:var(--green);border-radius:4px;cursor:ns-resize;pointer-events:auto;
    box-shadow:0 0 0 1px rgba(0,0,0,.4);}
  .gizmo .gz-y::after{content:'';position:absolute;top:-7px;left:-3px;
    border-bottom:8px solid var(--green);border-left:7px solid transparent;border-right:7px solid transparent;}
  .gizmo .gz-lab{position:absolute;font-family:'Roboto Mono',monospace;font-size:9px;
    color:var(--dim);pointer-events:none;white-space:nowrap;}
  .gizmo .gz-minus{position:absolute;left:14px;top:-30px;width:20px;height:20px;
    border-radius:50%;background:var(--panel-solid);border:1px solid var(--vp-red);
    color:var(--vp-red);font-size:15px;line-height:17px;text-align:center;cursor:pointer;
    pointer-events:auto;}
  .gizmo .gz-minus:hover{background:var(--vp-red);color:#fff;}

  /* Modal */
  #modalWrap{position:fixed;inset:0;z-index:40;display:none;align-items:center;
    justify-content:center;background:rgba(6,9,12,.55);backdrop-filter:blur(3px);}
  #modalWrap.show{display:flex;}
  .modalCard{background:var(--panel-solid);border:1px solid var(--panel-line);
    border-top:3px solid var(--path-blue);border-radius:6px;padding:22px 24px;max-width:420px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .modalCard.warn{border-top-color:var(--vp-red);}
  .modalCard h3{font-family:'Antonio',sans-serif;font-size:19px;letter-spacing:.04em;
    font-weight:600;margin-bottom:8px;}
  .modalCard p{font-size:13px;color:var(--dim);line-height:1.55;margin-bottom:18px;}
  .modalBtns{display:flex;gap:10px;justify-content:flex-end;}
  .modalBtns button{cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;
    padding:9px 16px;border-radius:4px;border:1px solid var(--panel-line);background:transparent;
    color:var(--ink);}
  .modalBtns button.primary{border-color:var(--path-blue);background:rgba(61,169,255,.14);}
  .modalBtns button.danger{border-color:var(--vp-red);background:rgba(255,0,55,.14);color:#ff7d97;}
  .modalBtns button:hover{filter:brightness(1.2);}
  .modalCard.info{border-top-color:var(--green);max-width:480px;}
  .instr{margin-bottom:18px;}
  .instr .ln{display:flex;gap:10px;align-items:flex-start;padding:6px 0;
    border-top:1px dashed rgba(255,255,255,.09);font-size:13px;color:var(--ink);line-height:1.5;}
  .instr .ln:first-child{border-top:none;}
  .instr .ln .n{flex:none;width:20px;height:20px;border-radius:50%;background:rgba(61,169,255,.16);
    border:1px solid var(--path-blue);color:var(--path-blue);font-family:'Roboto Mono',monospace;
    font-size:11px;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .instr .keys{margin-top:4px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--dim);
    display:flex;flex-wrap:wrap;gap:8px;}
  .instr .keys b{color:var(--ink);font-weight:500;}

  /* speed chevrons (1-5 fast-forward arrows) */
  .spd{display:inline-flex;gap:1px;align-items:center;cursor:ew-resize;pointer-events:auto;
    padding:1px 3px;border-radius:3px;}
  .spd:hover{background:rgba(255,255,255,.08);}
  .cv{font-family:'Roboto Mono',monospace;font-size:12px;font-weight:700;color:#3d454c;line-height:1;}
  .cv.on{color:var(--green);}
  .wp .spd{flex:none;}
  .gizmo .gz-spd{position:absolute;left:14px;top:8px;display:flex;gap:1px;align-items:center;
    background:var(--panel-solid);border:1px solid var(--panel-line);border-radius:3px;padding:2px 5px;
    pointer-events:auto;cursor:pointer;}
  .gizmo .gz-spd{cursor:ew-resize;}
  .gizmo .gz-spd:hover{border-color:var(--green);}
  #pipFrame .pipCtl{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);
    display:flex;align-items:stretch;gap:6px;}
  #pipFrame .pipChip{display:flex;align-items:center;gap:6px;background:rgba(8,10,13,.78);
    border:1px solid var(--panel-line);border-radius:4px;padding:4px 9px;pointer-events:auto;}
  #pipFrame #pipSpeed{cursor:pointer;}
  #pipFrame #pipSpeed:hover{border-color:var(--green);}
  #pipFrame .pipChip .lab{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--dim);}
  #pipFrame .pipChip .hv{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--ink);min-width:42px;text-align:center;}
  #pipFrame .pipChip .hb{pointer-events:auto;cursor:pointer;width:18px;height:18px;border-radius:3px;
    border:1px solid var(--panel-line);background:transparent;color:var(--ink);font-size:13px;line-height:1;
    display:flex;align-items:center;justify-content:center;}
  #pipFrame .pipChip .hb:hover{border-color:var(--path-blue);color:var(--path-blue);}
  .pipMax{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-line);background:rgba(8,10,13,.6);
    color:var(--ink);width:20px;height:18px;border-radius:3px;font-size:11px;line-height:1;
    display:inline-flex;align-items:center;justify-content:center;margin-right:6px;}
  .pipMax:hover{border-color:var(--path-blue);color:var(--path-blue);}
  #pipFrame.max{left:50%;top:58px;transform:translateX(-50%);width:70vw;height:calc(100vh - 150px);
    z-index:8;bottom:auto;}

  /* total-time modal */
  .timeBody{display:flex;gap:18px;align-items:center;justify-content:center;margin:10px 0 20px;}
  .timeLabels{display:flex;flex-direction:column;justify-content:space-between;height:200px;
    font-family:'Roboto Mono',monospace;font-size:10px;color:var(--dim);text-align:right;letter-spacing:.05em;}
  .timeTrack{position:relative;width:10px;height:200px;background:rgba(255,255,255,.1);border-radius:5px;cursor:pointer;flex:none;}
  .timeFill{position:absolute;left:0;right:0;bottom:0;background:var(--path-blue);border-radius:5px;}
  .timeHandle{position:absolute;left:50%;top:0;width:26px;height:26px;border-radius:50%;background:var(--panel-solid);
    border:2px solid var(--path-blue);transform:translate(-50%,-50%);cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.5);}
  .timeReadout{min-width:128px;}
  .timeReadout .big{font-family:'Antonio',sans-serif;font-size:44px;line-height:1;color:var(--ink);}
  .timeReadout .sub{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--dim);margin-top:8px;line-height:1.6;}

  /* gizmo trash + height stepper (top-down view) */
  .gizmo .gz-trash{position:absolute;left:14px;top:-32px;width:22px;height:22px;border-radius:50%;
    background:var(--panel-solid);border:1px solid var(--panel-line);color:var(--dim);font-size:11px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;}
  .gizmo .gz-trash:hover{border-color:var(--vp-red);color:var(--vp-red);}
  .gizmo .gz-hgt{position:absolute;left:14px;top:30px;display:flex;align-items:center;gap:3px;
    background:var(--panel-solid);border:1px solid var(--panel-line);border-radius:3px;padding:2px 4px;pointer-events:auto;}
  .gizmo .gz-hgt .hb{cursor:pointer;width:16px;height:16px;border-radius:3px;border:1px solid var(--panel-line);
    background:transparent;color:var(--ink);font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .gizmo .gz-hgt .hb:hover{border-color:var(--path-blue);color:var(--path-blue);}
  .gizmo .gz-hgt .hv{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--ink);min-width:38px;text-align:center;cursor:ns-resize;}
  #pipInput{position:absolute;inset:0;pointer-events:none;}
  #pipFrame.max #pipInput{cursor:grab;}

  /* waypoint two-row layout with height control */
  .wp{flex-direction:column;align-items:stretch;gap:4px;}
  .wpTop{display:flex;align-items:center;gap:7px;}
  .wpCtl{display:flex;align-items:center;flex-wrap:wrap;gap:8px 10px;padding-left:21px;}
  .lookPill{display:inline-flex;align-items:center;font-family:'Roboto Mono',monospace;font-size:10px;
    letter-spacing:.02em;padding:2px 9px;border-radius:10px;cursor:pointer;pointer-events:auto;white-space:nowrap;
    border:1px solid var(--vp-red);color:#ff7d97;background:transparent;opacity:.5;}
  .lookPill.fixed{background:rgba(255,0,55,.14);opacity:1;}
  .lookPill:hover{opacity:1;}
  .hgt{display:inline-flex;align-items:center;gap:4px;}
  .hgt .hb{pointer-events:auto;cursor:pointer;width:17px;height:17px;border-radius:3px;border:1px solid var(--panel-line);
    background:transparent;color:var(--ink);font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .hgt .hb:hover{border-color:var(--path-blue);color:var(--path-blue);}
  .hgt .hv{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--ink);min-width:42px;text-align:center;cursor:ns-resize;}

  /* read-only pip info label (replaces editable speed/height) */
  #pipInfo{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(8,10,13,.82);
    border:1px solid var(--panel-line);border-radius:6px;padding:4px 9px 5px;pointer-events:auto;}
  #pipInfo .pipHdr{font-family:'Roboto Mono',monospace;font-size:8.5px;letter-spacing:.1em;
    color:var(--dim);text-transform:uppercase;}
  #pipInfo .pipRow{display:flex;align-items:center;gap:8px;}
  #pipInfo .spd{cursor:ew-resize;padding:1px 3px;border-radius:3px;}
  #pipInfo .spd:hover{background:rgba(255,255,255,.08);}
  #pipInfo .hgt{display:inline-flex;align-items:center;gap:3px;}
  #pipInfo .hv{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--ink);min-width:40px;text-align:center;
    cursor:ns-resize;border-radius:3px;padding:1px 2px;}
  #pipInfo .hv:hover{background:rgba(255,255,255,.08);}
  #pipInfo .hb{cursor:pointer;width:18px;height:18px;border-radius:3px;border:1px solid var(--panel-line);
    background:transparent;color:var(--ink);font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;}
  #pipInfo .hb:hover{border-color:var(--path-blue);color:var(--path-blue);}

  /* selected gizmo highlight + look-at toggle */
  .gizmo.sel .gz-sq{background:#fff;box-shadow:0 0 0 2px rgba(61,169,255,.6);}
  .gizmo .gz-look{position:absolute;left:-34px;top:-30px;width:22px;height:22px;border-radius:50%;
    background:var(--panel-solid);border:1px solid var(--panel-line);color:var(--dim);font-size:13px;
    line-height:20px;text-align:center;cursor:pointer;pointer-events:auto;opacity:.45;}
  .gizmo .gz-look.on{border-color:var(--vp-red);color:#ff7d97;opacity:1;}
  .gizmo .gz-look:hover{border-color:var(--path-blue);color:var(--path-blue);opacity:1;}
  .wp.selected{background:rgba(61,169,255,.12);}

  /* bottom timeline node bar */
  #timeline{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;
    width:min(900px,calc(100vw - 360px));height:60px;z-index:11;
    display:flex;align-items:center;gap:8px;padding:7px 10px;
    background:rgba(10,13,17,.94);border:1px solid var(--panel-line);border-radius:10px;
    box-shadow:0 10px 34px rgba(0,0,0,.5);backdrop-filter:blur(8px);pointer-events:auto;}
  #timeline .tlPlay{flex:none;cursor:pointer;width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;
    color:var(--ink);background:var(--green);border:none;opacity:.92;}
  #timeline .tlPlay:hover{opacity:1;}
  #timeline .tlPlay.playing{background:var(--vp-red);}
  #timeline .tlScroll{flex:1;height:100%;overflow-x:auto;overflow-y:hidden;}
  #timeline .tlScroll::-webkit-scrollbar{height:6px;}
  #timeline .tlScroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px;}
  #timeline .tlTrack{position:relative;height:100%;min-width:100%;cursor:crosshair;}
  #timeline .tlSeg{position:absolute;top:50%;height:5px;transform:translateY(-50%);border-radius:3px;}
  #timeline .tlChev{position:absolute;top:calc(50% - 16px);transform:translateX(-50%);
    font-family:'Roboto Mono',monospace;font-size:11px;font-weight:700;white-space:nowrap;pointer-events:none;}
  #timeline .tlDot{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;
    transform:translate(-50%,-50%);background:var(--panel-solid);border:2px solid var(--ink);cursor:pointer;z-index:2;}
  #timeline .tlDot:hover{border-color:var(--path-blue);}
  #timeline .tlDot.sel{border-color:var(--path-blue);box-shadow:0 0 0 3px rgba(61,169,255,.3);}
  #timeline .tlNum{position:absolute;top:calc(50% + 11px);transform:translateX(-50%);
    font-family:'Roboto Mono',monospace;font-size:9px;color:var(--dim);pointer-events:none;}
  #timeline .tlHead{position:absolute;top:6px;bottom:6px;width:2px;background:#fff;
    box-shadow:0 0 6px rgba(255,255,255,.7);pointer-events:none;z-index:3;}
  #timeline .tlTime{flex:none;cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;
    color:var(--ink);background:var(--panel);border:1px solid var(--panel-line);border-radius:4px;padding:8px 12px;}
  #timeline .tlTime:hover{border-color:var(--path-blue);}

  @media (hover:none){ .btn{padding:13px 20px;font-size:14px;} }
  @media (max-width:920px){
    #help{display:none;}
    #pipFrame{width:248px;height:155px;}
    #paths{width:240px;}
  }
</style>
</head>
<body>

  <div class="label">Cursor</div>

  <div>Elev <span class="v" id="roElev">–</span> m</div>
  <div>AGL <span class="v" id="roAlt">120</span> m</div>

</div>

<div id="modalWrap"><div class="modalCard" id="modalCard"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================================
   GEAAR Flight Path Authoring Mock-up
   Reference implementation for the Unity rebuild.

   DATA MODEL
   - paths[] : each = { id, name, colour, nodes:[ {dronePos, target} ], collapsed }
       node.dronePos : Vector3, y = terrainHeightAt(x,z) + 120 m AGL
       node.target   : Vector3, y = terrainHeightAt(x,z)  (on the ground)
   - One path is "active": it is the one you create / edit / fly. Its viewing
     cones light the darkened overlay; other paths draw as faint splines.

   GEOMETRY
   - terrainHeightAt(x,z) is the single source of truth: it displaces the mesh
     AND is what the raycaster resolves against, so placed points sit on the
     surface and the spline rises / falls with the ground (proving AGL).
   - Drone path  = centripetal Catmull-Rom through node.dronePos (no overshoot,
     film-friendly), sampled densely + arc-length spaced for smooth motion.
   - Target path = per-segment linear interpolation between node.target values.
   - Viewing cones render into an offscreen ortho lightmap (MAX blend so
     overlaps never over-brighten); the dark overlay is punched through where
     light > 0. Keyframe cones write 1.0, the swept travel area writes ~0.5.

   EDITING
   - Hold Ctrl or toggle "Move nodes" to show XY gizmos on every drone + target
     handle (X arrow = east, Y arrow = north, square = free). A floating minus
     on each waypoint removes that node (with confirm).
   - Right-click / Esc / End button raise the end-mode modal.
   ========================================================================= */

const WORLD       = 9600;
const TILE        = 2400;
const DEFAULT_AGL = 120;    // default drone altitude (m AGL) = 6 x 20 m cubes
const HEIGHT_STEP = 20;     // height adjusts in 20 m increments (one cube)
const HEIGHT_MIN  = 20;
const HEIGHT_MAX  = 300;
const CONE_HALF   = 24;
const SWEPT_LIGHT = 0.5;
const DARKNESS    = 0.62;
const PREVIEW_SPD = 160;
const HORIZON     = 0x16222e;
const PALETTE     = [0x3da9ff, 0xff8a3d, 0x3ddc84, 0xc77dff, 0xffd23d, 0xff5b7c];
// Per-waypoint speed: level 1..5 maps to a cruise velocity (m/s). 2 = normal.
const SPEED_VELS  = [0, 48, 96, 160, 232, 320];
// Speed level 1..5 -> colour (purple = slow, orange = fast). Index 0 unused.
const SPEED_COLOURS = [0x000000, 0xc77dff, 0x3da9ff, 0x3ddc84, 0xffd23d, 0xff8a3d];
const FORWARD_DIST  = 250;   // metres ahead a "look forward" (targetless) node aims
function speedColour(level){ return SPEED_COLOURS[level] || SPEED_COLOURS[2]; }
const EASE_FRAC   = 0.22;   // fraction of the path eased in / out (large, for filming)
const EASE_FLOOR  = 0.12;   // speed at the very start / end as a fraction of cruise

// Localised mountains (x, z, amplitude, radius) summed on top of the rolling base.
const PEAKS=[
  [-3200,-3000, 250, 1500],
  [ 2400, 2800, 320, 1700],
  [ 3600,-1600, 230, 1300],
  [-1200, 2200, 210, 1400],
  [-3400, 1300, 190, 1100],
  [ 1000,-3200, 240, 1500]
];
function terrainHeightAt(x, z){
  let h = 0;
  h += 150 * Math.sin(x*0.00055 + 1.3) * Math.cos(z*0.00048 - 0.7);  // big rolling hills
  h += 70  * Math.sin(x*0.0013  - 2.1) * Math.cos(z*0.0016  + 1.1);
  h += 28  * Math.sin(x*0.0039  + 0.4) * Math.cos(z*0.0041  + 2.3);
  h += 40  * Math.sin((x + z)*0.00085);
  for(let i=0;i<PEAKS.length;i++){ const p=PEAKS[i];
    const dx=x-p[0], dz=z-p[1]; h += p[2]*Math.exp(-(dx*dx+dz*dz)/(2*p[3]*p[3])); }
  return h;
}

// ---------- renderer / scene ----------
const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(HORIZON);
scene.fog = new THREE.Fog(HORIZON, WORLD*0.32, WORLD*0.95);
scene.add(new THREE.AmbientLight(0xffffff, 0.78));
const sun = new THREE.DirectionalLight(0xfff2dd, 0.85);
sun.position.set(1600, 2600, 1100); scene.add(sun);

const mapCam = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 32000);
mapCam.layers.enable(1);
let camHeight = 1500;
const camCentre = new THREE.Vector3(0,0,0), camGoal = new THREE.Vector3(0,0,0);
function placeMapCam(){
  mapCam.position.set(camCentre.x, camHeight, camCentre.z);
  mapCam.up.set(0,0,-1);
  mapCam.lookAt(camCentre.x, 0, camCentre.z);
}
placeMapCam();

const pipCam = new THREE.PerspectiveCamera(50, 340/212, 2, 32000);
let selectedNode=-1;   // primary selected waypoint index (-1 = none)

// ---------- sky ----------
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(16000, 32, 18),
  new THREE.ShaderMaterial({ side:THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{ top:{value:new THREE.Color(0x2a5a86)}, mid:{value:new THREE.Color(0x6f93ad)},
               bot:{value:new THREE.Color(HORIZON)} },
    vertexShader:`varying vec3 vP; void main(){ vP=position;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
    fragmentShader:`uniform vec3 top; uniform vec3 mid; uniform vec3 bot; varying vec3 vP;
      void main(){ float h=normalize(vP).y;
        vec3 c = h>0.0 ? mix(mid,top,smoothstep(0.0,0.55,h)) : mix(mid,bot,smoothstep(0.0,0.28,-h));
        gl_FragColor=vec4(c,1.);}` })
));

// ---------- terrain ----------
function buildTerrainTexture(){
  const S=1024, c=document.createElement('canvas'); c.width=c.height=S;
  const g=c.getContext('2d');
  g.fillStyle='#4b5a33'; g.fillRect(0,0,S,S);
  const pals=['#52643a','#5c6e3e','#6b6f44','#7a6e4a','#8a7850','#475c33','#3f5631'];
  for(let i=0;i<300;i++){ g.fillStyle=pals[(Math.random()*pals.length)|0];
    g.globalAlpha=0.22+Math.random()*0.34; g.beginPath();
    g.ellipse(Math.random()*S,Math.random()*S,18+Math.random()*80,12+Math.random()*54,Math.random()*Math.PI,0,Math.PI*2);
    g.fill(); }
  g.globalAlpha=1;
  for(let i=0;i<6;i++){ g.fillStyle=['#9a8a5c','#a39263','#8f7f52'][(i%3)]; g.globalAlpha=.7;
    g.fillRect(120+Math.random()*120+i*70,110+i*120,150+Math.random()*150,60); }
  g.globalAlpha=1; g.strokeStyle='#7d7f78'; g.lineCap='round'; g.lineWidth=8;
  g.beginPath(); g.moveTo(0,512); g.bezierCurveTo(300,470,700,560,S,500); g.stroke();
  g.beginPath(); g.moveTo(512,0); g.bezierCurveTo(480,350,560,700,512,S); g.stroke();
  for(let i=0;i<5200;i++){ g.fillStyle=Math.random()>.5?'rgba(255,255,255,.05)':'rgba(0,0,0,.07)';
    g.fillRect(Math.random()*S,Math.random()*S,2,2); }
  const step=S/(TILE/100);
  g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1;
  for(let p=0;p<=S;p+=step){ g.beginPath(); g.moveTo(p,0); g.lineTo(p,S); g.stroke();
    g.beginPath(); g.moveTo(0,p); g.lineTo(S,p); g.stroke(); }
  g.strokeStyle='rgba(255,255,255,.12)';
  for(let p=0;p<=S;p+=step*5){ g.beginPath(); g.moveTo(p,0); g.lineTo(p,S); g.stroke();
    g.beginPath(); g.moveTo(0,p); g.lineTo(S,p); g.stroke(); }
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(WORLD/TILE,WORLD/TILE);
  tex.anisotropy=renderer.capabilities.getMaxAnisotropy(); return tex;
}
const SEG=192;
function buildTerrainGeometry(){
  const g=new THREE.BufferGeometry();
  const pos=new Float32Array((SEG+1)*(SEG+1)*3), uv=new Float32Array((SEG+1)*(SEG+1)*2);
  let p=0,u=0;
  for(let i=0;i<=SEG;i++) for(let j=0;j<=SEG;j++){
    const x=-WORLD/2+WORLD*(j/SEG), z=-WORLD/2+WORLD*(i/SEG);
    pos[p++]=x; pos[p++]=terrainHeightAt(x,z); pos[p++]=z; uv[u++]=j/SEG; uv[u++]=i/SEG;
  }
  const idx=[];
  for(let i=0;i<SEG;i++) for(let j=0;j<SEG;j++){
    const a=i*(SEG+1)+j,b=a+1,c=a+(SEG+1),d=c+1; idx.push(a,c,b,b,c,d); }
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  g.setIndex(idx); g.computeVertexNormals(); return g;
}
const terrainGeo=buildTerrainGeometry();
const ground=new THREE.Mesh(terrainGeo,new THREE.MeshLambertMaterial({map:buildTerrainTexture()}));
scene.add(ground);

(function tileSeams(){
  const pts=[], lift=3;
  for(let t=-WORLD/2;t<=WORLD/2+1;t+=TILE){
    for(let s=-WORLD/2;s<WORLD/2;s+=WORLD/SEG){
      const s2=s+WORLD/SEG;
      pts.push(t,terrainHeightAt(t,s)+lift,s, t,terrainHeightAt(t,s2)+lift,s2);
      pts.push(s,terrainHeightAt(s,t)+lift,t, s2,terrainHeightAt(s2,t)+lift,t);
    }
  }
  scene.add(new THREE.LineSegments(
    new THREE.BufferGeometry().setAttribute('position',new THREE.Float32BufferAttribute(pts,3)),
    new THREE.LineBasicMaterial({color:0x8fb6d6,transparent:true,opacity:.35})));
})();

(function scenery(){
  let seed=99; const rnd=()=>(seed=(seed*1664525+1013904223)%4294967296)/4294967296;
  const greys=[0x9aa0a6,0x8a9098,0xb4b9bd,0x787f86,0xc2c0b8];
  function box(x,z,w,d,h,col){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:col}));
    m.position.set(x,terrainHeightAt(x,z)+h/2,z); m.rotation.y=rnd()*Math.PI; scene.add(m);
  }
  [[-1800,-1200],[2600,900],[-700,3100],[3400,-2600],[600,-300]].forEach(([cx,cz])=>{
    const n=10+(rnd()*14|0);
    for(let i=0;i<n;i++){ const x=cx+(rnd()-0.5)*900,z=cz+(rnd()-0.5)*900;
      box(x,z,18+rnd()*34,18+rnd()*34,10+rnd()*44,greys[rnd()*greys.length|0]); }
  });
  for(let i=0;i<70;i++){ const x=(rnd()-0.5)*WORLD*0.92,z=(rnd()-0.5)*WORLD*0.92;
    box(x,z,14+rnd()*22,14+rnd()*22,8+rnd()*22,greys[rnd()*greys.length|0]); }
  const mastMat=new THREE.MeshLambertMaterial({color:0xd23b3b});
  for(let i=0;i<10;i++){ const x=(rnd()-0.5)*WORLD*0.8,z=(rnd()-0.5)*WORLD*0.8,hh=60+rnd()*40;
    const m=new THREE.Mesh(new THREE.CylinderGeometry(1.4,2.4,hh,7),mastMat);
    m.position.set(x,terrainHeightAt(x,z)+hh/2,z); scene.add(m); }
  const trunkMat=new THREE.MeshLambertMaterial({color:0x5b4a32});
  const leafMat=new THREE.MeshLambertMaterial({color:0x37532e});
  for(let i=0;i<260;i++){ const x=(rnd()-0.5)*WORLD*0.95,z=(rnd()-0.5)*WORLD*0.95;
    const y=terrainHeightAt(x,z),s=0.7+rnd()*1.1;
    const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.7,1,6*s,5),trunkMat);
    tr.position.set(x,y+3*s,z); scene.add(tr);
    const lf=new THREE.Mesh(new THREE.ConeGeometry(4.5*s,12*s,6),leafMat);
    lf.position.set(x,y+6*s+5*s,z); scene.add(lf); }
})();

// ---------- tall unique landmarks (1-2 per tile) ----------
(function landmarks(){
  const mat=c=>new THREE.MeshLambertMaterial({color:c});
  const basic=c=>new THREE.MeshBasicMaterial({color:c});
  function lattice(){ const g=new THREE.Group(), h=145;
    const t=new THREE.Mesh(new THREE.CylinderGeometry(3,9,h,8),mat(0xb24a3a)); t.position.y=h/2; g.add(t);
    for(let i=1;i<=3;i++){ const r=new THREE.Mesh(new THREE.TorusGeometry(7-i*1.6,0.8,6,12),mat(0xd9d9d9));
      r.rotation.x=Math.PI/2; r.position.y=h*i/4; g.add(r); }
    const b=new THREE.Mesh(new THREE.SphereGeometry(4.5,12,10),basic(0xff3b3b)); b.position.y=h+5; g.add(b); return g; }
  function waterTower(){ const g=new THREE.Group(), h=72;
    const col=new THREE.Mesh(new THREE.CylinderGeometry(4,4,h,10),mat(0x9fb0b8)); col.position.y=h/2; g.add(col);
    const tank=new THREE.Mesh(new THREE.CylinderGeometry(20,20,24,16),mat(0x6fa3b5)); tank.position.y=h+8; g.add(tank);
    const top=new THREE.Mesh(new THREE.ConeGeometry(21,14,16),mat(0x4d7d8c)); top.position.y=h+27; g.add(top); return g; }
  function chimney(){ const g=new THREE.Group(), h=170;
    const c=new THREE.Mesh(new THREE.CylinderGeometry(7,12,h,16),mat(0xcfc8bd)); c.position.y=h/2; g.add(c);
    const band=new THREE.Mesh(new THREE.CylinderGeometry(7.6,7.6,12,16),mat(0xb24a3a)); band.position.y=h-16; g.add(band); return g; }
  function obelisk(){ const g=new THREE.Group(), h=125;
    const b=new THREE.Mesh(new THREE.CylinderGeometry(2.5,9,h,4),mat(0xcdbf9c)); b.rotation.y=Math.PI/4; b.position.y=h/2; g.add(b);
    const cap=new THREE.Mesh(new THREE.ConeGeometry(4,12,4),mat(0xe6d6a8)); cap.rotation.y=Math.PI/4; cap.position.y=h+6; g.add(cap); return g; }
  function turbine(){ const g=new THREE.Group(), h=125;
    const tw=new THREE.Mesh(new THREE.CylinderGeometry(2.5,4.5,h,12),mat(0xf2f2f2)); tw.position.y=h/2; g.add(tw);
    const nac=new THREE.Mesh(new THREE.BoxGeometry(6,6,14),mat(0xe6e6e6)); nac.position.y=h; g.add(nac);
    const hub=new THREE.Group(); hub.position.set(0,h,9);
    for(let i=0;i<3;i++){ const arm=new THREE.Group(); arm.rotation.z=i*2*Math.PI/3;
      const bl=new THREE.Mesh(new THREE.BoxGeometry(2.6,48,1.2),mat(0xfafafa)); bl.position.y=24; arm.add(bl); hub.add(arm); }
    g.add(hub); return g; }
  function dome(){ const g=new THREE.Group(), h=34;
    const base=new THREE.Mesh(new THREE.CylinderGeometry(22,24,h,20),mat(0xdadfe2)); base.position.y=h/2; g.add(base);
    const d=new THREE.Mesh(new THREE.SphereGeometry(22,20,12,0,Math.PI*2,0,Math.PI/2),mat(0xeef1f3)); d.position.y=h; g.add(d); return g; }
  function pyramid(){ const g=new THREE.Group(), h=135;
    const p=new THREE.Mesh(new THREE.ConeGeometry(72,h,4),mat(0xc9a66b)); p.rotation.y=Math.PI/4; p.position.y=h/2; g.add(p); return g; }
  const types=[lattice,waterTower,chimney,obelisk,turbine,dome,pyramid];
  let seed=7; const rnd=()=>(seed=(seed*1103515245+12345)%2147483648)/2147483648;
  let k=0; const tiles=WORLD/TILE;
  for(let ti=0;ti<tiles;ti++) for(let tj=0;tj<tiles;tj++){
    const cx=-WORLD/2+TILE/2+ti*TILE, cz=-WORLD/2+TILE/2+tj*TILE;
    const count=1+(rnd()<0.4?1:0);
    for(let n=0;n<count;n++){
      const x=cx+(rnd()-0.5)*TILE*0.6, z=cz+(rnd()-0.5)*TILE*0.6;
      const g=types[(k++)%types.length]();
      g.position.set(x,terrainHeightAt(x,z),z); g.rotation.y+=rnd()*Math.PI*2; scene.add(g);
    }
  }
})();

// ---------- lightmap ----------
const lightRT=new THREE.WebGLRenderTarget(2048,2048,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});
const lightScene=new THREE.Scene();
const lightCam=new THREE.OrthographicCamera(-WORLD/2,WORLD/2,WORLD/2,-WORLD/2,1,500);
lightCam.position.set(0,200,0); lightCam.up.set(0,0,-1); lightCam.lookAt(0,0,0);

function makeSectorGeometry(halfDeg,segs=30){
  const half=THREE.MathUtils.degToRad(halfDeg), v=[];
  for(let i=0;i<segs;i++){ const a0=-half+(2*half)*(i/segs), a1=-half+(2*half)*((i+1)/segs);
    v.push(0,0,0, Math.cos(a0),0,Math.sin(a0), Math.cos(a1),0,Math.sin(a1)); }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(v),3)); return g;
}
const sectorGeo=makeSectorGeometry(CONE_HALF);
function makeSectorMaterial(b){
  const m=new THREE.MeshBasicMaterial({color:new THREE.Color(b,b,b),side:THREE.DoubleSide,depthTest:false,depthWrite:false});
  m.blending=THREE.CustomBlending; m.blendEquation=THREE.MaxEquation; m.blendSrc=THREE.OneFactor; m.blendDst=THREE.OneFactor; return m;
}
const brightSectorMat=makeSectorMaterial(1.0), sweptSectorMat=makeSectorMaterial(SWEPT_LIGHT);
function coneLength(d,t){ const dist=Math.hypot(t.x-d.x,t.z-d.z); return THREE.MathUtils.clamp(dist*1.35+40,80,820); }
function orientSector(m,d,t){ m.position.set(d.x,0,d.z); m.rotation.y=Math.atan2(-(t.z-d.z),t.x-d.x);
  const L=coneLength(d,t); m.scale.set(L,1,L); }

const activeSector=new THREE.Mesh(sectorGeo,brightSectorMat); activeSector.visible=false; lightScene.add(activeSector);
const keyframeSectors=[]; const sweptGroup=new THREE.Group(); lightScene.add(sweptGroup);

// ---------- dark overlay (terrain skin) ----------
const overlay=new THREE.Mesh(terrainGeo,new THREE.ShaderMaterial({
  transparent:true, depthWrite:false, fog:false,
  uniforms:{ tLight:{value:lightRT.texture}, uDark:{value:DARKNESS}, uHalf:{value:WORLD/2} },
  vertexShader:`varying vec3 vW; void main(){ vW=(modelMatrix*vec4(position,1.)).xyz;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader:`uniform sampler2D tLight; uniform float uDark; uniform float uHalf; varying vec3 vW;
    void main(){ vec2 uv=vec2(vW.x,-vW.z)/(2.0*uHalf)+0.5; float l=texture2D(tLight,uv).r;
      gl_FragColor=vec4(0.,0.,0.,uDark*(1.0-l)); }`
}));
overlay.position.y=2.0; overlay.renderOrder=5; overlay.layers.set(1); overlay.visible=false; scene.add(overlay);

// ---------- markers ----------

// Height visualised as a stack of 20 m cubes under the waypoint.
const cubeGeo=new THREE.BoxGeometry(9,19,9);

const _fw=new THREE.Vector3(),_rt=new THREE.Vector3(),_up=new THREE.Vector3(),_fc=new THREE.Vector3(),_c=[];
for(let i=0;i<4;i++) _c.push(new THREE.Vector3());
function updateCamMarker(P,T){
  _fw.subVectors(T,P); if(_fw.lengthSq()<1e-6){ camMarker.visible=false; return; }
  _fw.normalize();
  _rt.crossVectors(_fw,new THREE.Vector3(0,1,0)); if(_rt.lengthSq()<1e-6) _rt.set(1,0,0); _rt.normalize();
  _up.crossVectors(_rt,_fw).normalize();

  _fc.copy(P).addScaledVector(_fw,d);
  _c[0].copy(_fc).addScaledVector(_rt, w).addScaledVector(_up, h);
  _c[1].copy(_fc).addScaledVector(_rt,-w).addScaledVector(_up, h);
  _c[2].copy(_fc).addScaledVector(_rt,-w).addScaledVector(_up,-h);
  _c[3].copy(_fc).addScaledVector(_rt, w).addScaledVector(_up,-h);
  const segs=[P,_c[0], P,_c[1], P,_c[2], P,_c[3], _c[0],_c[1], _c[1],_c[2], _c[2],_c[3], _c[3],_c[0]];

const pathGroup=new THREE.Group(); scene.add(pathGroup);

  a.visible=false; a.renderOrder=11; pathGroup.add(a); arrowPool.push(a); }

const glyphU=new Float32Array(48);// per-glyph arc-length position, advanced at the local leg speed

function buildCurve(points){ return points.length>=2 ? new THREE.CatmullRomCurve3(points,false,'centripetal') : null; }

// ============================ DATA MODEL ============================
let pathSeq=0;
const paths=[];
let activeId=null;
const active=()=>paths.find(p=>p.id===activeId)||null;

function clearSelection(){ selectedNode=-1; selection.clear(); selMode='single'; }

    selMode='multi';

// ============================ REBUILD ============================
function dronePointsForActive(){
  const a=active(); if(!a) return [];
  return a.nodes.map(n=>n.dronePos.clone());
}
function rebuildPath(){
  if(pathLine){ pathGroup.remove(pathLine); pathLine.geometry.dispose(); pathLine.material.dispose(); pathLine=null; }
  if(targetLine){ pathGroup.remove(targetLine); targetLine.geometry.dispose(); targetLine=null; }
  droneCurve=null; curveLen=0; arrowCount=0; arrowPool.forEach(a=>a.visible=false);
  const a=active();
  const pts=dronePointsForActive();
  const N=a?a.nodes.length:0;
  if(pts.length>=2){
    droneCurve=buildCurve(pts); curveLen=droneCurve.getLength();
    // vertex-coloured line: each sample takes the colour of the speed of the segment it sits in
    const SAMPLES=400, cps=droneCurve.getPoints(SAMPLES);
    const posArr=new Float32Array(cps.length*3), colArr=new Float32Array(cps.length*3), col=new THREE.Color();
    for(let k=0;k<cps.length;k++){
      const u=k/SAMPLES, seg=Math.min(Math.floor(u*(N-1)),N-2);
      col.setHex(speedColour(a.nodes[seg+1].speed));
      posArr[k*3]=cps[k].x; posArr[k*3+1]=cps[k].y; posArr[k*3+2]=cps[k].z;
      colArr[k*3]=col.r; colArr[k*3+1]=col.g; colArr[k*3+2]=col.b;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(posArr,3));
    geo.setAttribute('color',new THREE.BufferAttribute(colArr,3));
    pathLine=new THREE.Line(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.95}));
    pathLine.renderOrder=11; pathGroup.add(pathLine);
    arrowCount=Math.min(48,Math.max(3,Math.round(curveLen/90)));   // chevron glyphs along the path
    for(let i=0;i<arrowCount;i++) glyphU[i]=i/arrowCount;          // re-seed even spacing
  }
  if(a && N>=2){
    const tps=a.nodes.map((n,i)=>{ const t=resolvedTarget(i); return t.clone().setY(t.y+2); });
    targetLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(tps),
      new THREE.LineDashedMaterial({color:0xff5b7c,transparent:true,opacity:.5,dashSize:8,gapSize:7}));
    targetLine.computeLineDistances(); targetLine.renderOrder=10; pathGroup.add(targetLine);
  }
  $('roLen').textContent=Math.round(curveLen);
  $('roCount').textContent=N;
  buildMotion();
  $('roTime').textContent = motion ? fmtTime(motion.total*timeScale) : '0:00';
  renderTimeline();
  updateButtons();
}
function updateArrows(dt){
  const a=active();
  if(!droneCurve||arrowCount===0||!a||a.nodes.length<2){ arrowPool.forEach(m=>m.visible=false); return; }
  const N=a.nodes.length;
  const up=new THREE.Vector3(0,1,0), col=new THREE.Color();
  const dPar=10/Math.max(curveLen,1);   // ~10 m spacing between stacked chevrons
  let ci=0;
  for(let i=0;i<arrowCount && ci<ARROW_MAX;i++){
    // advance each chevron group at its own leg speed so faster legs scroll faster
    let u0=glyphU[i];
    const seg=Math.min(Math.floor(u0*(N-1)),N-2), lv=a.nodes[seg+1].speed;
    u0=(u0 + dt*speedVel(lv)*ARROW_FLOW/Math.max(curveLen,1))%1;
    glyphU[i]=u0;
    col.setHex(speedColour(lv));
    const tan=droneCurve.getTangentAt(u0);
    for(let c=0;c<lv && ci<ARROW_MAX;c++){          // chevron count == speed level
      const u=((u0 - c*dPar)%1+1)%1, m=arrowPool[ci++];
      m.position.copy(droneCurve.getPointAt(u));
      m.quaternion.setFromUnitVectors(up,tan);
      m.material.color.copy(col); m.visible=true;
    }
  }
  for(;ci<ARROW_MAX;ci++) arrowPool[ci].visible=false;
}

// ---------- speed / time model ----------
// speed[i] = cruise speed of the segment ENDING at node i (node 0 has none).
// The profile smooths between segment cruise speeds and eases in/out hard at
// the ends, so playback reads like a real drone shot rather than constant pace.
function smoothstep(x){ x=Math.max(0,Math.min(1,x)); return x*x*(3-2*x); }
function speedVel(level){ return SPEED_VELS[level]||SPEED_VELS[2]; }
function fmtTime(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60); const ss=s%60; return m+':'+String(ss).padStart(2,'0'); }

function buildMotion(){
  motion=null;
  const a=active(); if(!a||a.nodes.length<2||!droneCurve) return;
  const N=a.nodes.length, M=600, pts=[], cruise=[];
  for(let j=0;j<=M;j++){ const t=j/M; pts.push(droneCurve.getPoint(t));
    const seg=Math.min(Math.floor(t*(N-1)),N-2); cruise.push(speedVel(a.nodes[seg+1].speed)); }
  // smooth the cruise speed so changes between legs are gradual
  const W=Math.max(2,Math.round(M*0.05)), sm=new Array(M+1);
  for(let j=0;j<=M;j++){ let s=0,c=0; for(let k=-W;k<=W;k++){ const i=j+k; if(i>=0&&i<=M){ s+=cruise[i]; c++; } } sm[j]=s/c; }
  // arc-length fraction at each sample (for the ease envelope)
  const ds=[]; let len=0; for(let j=0;j<M;j++){ const d=pts[j+1].distanceTo(pts[j]); ds.push(d); len+=d; }
  const frac=[0]; let acc=0; for(let j=0;j<M;j++){ acc+=ds[j]; frac.push(acc/Math.max(len,1e-6)); }
  function env(f){ if(f<EASE_FRAC) return EASE_FLOOR+(1-EASE_FLOOR)*smoothstep(f/EASE_FRAC);
    if(f>1-EASE_FRAC) return EASE_FLOOR+(1-EASE_FLOOR)*smoothstep((1-f)/EASE_FRAC); return 1; }
  const cum=[0]; let total=0;
  for(let j=0;j<M;j++){ const v0=sm[j]*env(frac[j]), v1=sm[j+1]*env(frac[j+1]); const v=Math.max(0.5,(v0+v1)/2);
    total+=ds[j]/v; cum.push(total); }
  motion={ M, total, cum };
}
function motionSample(timeSec){
  if(!motion) return 0;
  const total=motion.total*timeScale; let t=((timeSec%total)+total)%total; const tt=t/timeScale;
  const cum=motion.cum; let lo=0,hi=cum.length-1;
  while(lo<hi-1){ const mid=(lo+hi)>>1; if(cum[mid]<=tt) lo=mid; else hi=mid; }
  const f=(tt-cum[lo])/Math.max(1e-6,cum[hi]-cum[lo]); return (lo+f)/motion.M;
}
// Resolve a node's look-at point. An explicit node.target wins; otherwise the
// camera looks "forward" along the drone-path tangent at that node (the last node
// keeps the direction it arrived on). This is the single converter every consumer
// (motion, viewing cones, target line, preview, timeline) must route through.
function resolvedTarget(i){
  const a=active(); if(!a||!a.nodes[i]) return new THREE.Vector3();
  const n=a.nodes[i];
  if(n.target) return n.target;
  const N=a.nodes.length;
  if(droneCurve && N>=2){
    const u=THREE.MathUtils.clamp(i/(N-1),0,1);
    const tan=droneCurve.getTangentAt(u);
    const px=n.dronePos.x+tan.x*FORWARD_DIST, pz=n.dronePos.z+tan.z*FORWARD_DIST;
    return new THREE.Vector3(px, terrainHeightAt(px,pz), pz);
  }
  const px=n.dronePos.x, pz=n.dronePos.z+FORWARD_DIST;   // single-node fallback: look north
  return new THREE.Vector3(px, terrainHeightAt(px,pz), pz);
}
function targetAtParam(param){
  const a=active(), N=a.nodes.length, x=Math.min(param*(N-1),N-1-1e-6), i=Math.floor(x), f=x-i;
  return resolvedTarget(i).clone().lerp(resolvedTarget(i+1),f);
}
function speedChevrons(level){
  const hex='#'+speedColour(level).toString(16).padStart(6,'0');   // match the line/arrow colour
  let s=''; for(let i=1;i<=5;i++){ const on=i<=level;
    s+=`<span class="cv${on?' on':''}"${on?` style="color:${hex}"`:''}>›</span>`; }
  return s;
}
function rebuildCommitted(){
  while(markerGroup.children.length){ const c=markerGroup.children[0]; markerGroup.remove(c); }
  keyframeSectors.forEach(s=>lightScene.remove(s)); keyframeSectors.length=0;
  while(sweptGroup.children.length) sweptGroup.remove(sweptGroup.children[0]);
  const a=active();
  if(a){
    a.nodes.forEach((n,i)=>{
      const dm=makeDroneMarker(false,n.agl); dm.position.copy(n.dronePos); markerGroup.add(dm);
      const cubes=makeHeightCubes(n.agl);
      cubes.position.set(n.dronePos.x, terrainHeightAt(n.dronePos.x,n.dronePos.z), n.dronePos.z);
      markerGroup.add(cubes);
      const t=resolvedTarget(i);
      if(n.target){ const tm=makeTargetMarker(false); tm.position.set(t.x,t.y+2.5,t.z); markerGroup.add(tm); }
      const ks=new THREE.Mesh(sectorGeo,brightSectorMat); orientSector(ks,n.dronePos,t);
      lightScene.add(ks); keyframeSectors.push(ks);
    });
    if(a.nodes.length>=2){
      const curve=buildCurve(a.nodes.map(n=>n.dronePos.clone()));
      const segs=a.nodes.length-1, STEPS=16;
      for(let i=0;i<segs;i++) for(let s=1;s<STEPS;s++){
        const f=s/STEPS, u=(i+f)/segs, p=curve.getPoint(u);
        const t=resolvedTarget(i).clone().lerp(resolvedTarget(i+1),f);
        const m=new THREE.Mesh(sectorGeo,sweptSectorMat); orientSector(m,p,t); sweptGroup.add(m);
      }
    }
  }
  overlay.visible = !!(a && a.nodes.length>=1);
}
function rebuildInactive(){
  while(inactiveGroup.children.length){ const c=inactiveGroup.children[0]; inactiveGroup.remove(c);
    if(c.geometry) c.geometry.dispose(); }
  paths.forEach(p=>{
    if(p.id===activeId||p.nodes.length<2) return;
    const curve=buildCurve(p.nodes.map(n=>n.dronePos.clone()));
    const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(240)),
      new THREE.LineBasicMaterial({color:p.colour,transparent:true,opacity:.28}));
    inactiveGroup.add(l);
  });
}
function refreshAll(){
  // rebuildPath first so droneCurve is current before resolvedTarget()'s tangent
  // fallback is evaluated inside rebuildCommitted's viewing-cone build.
  rebuildPath(); rebuildCommitted(); rebuildInactive(); renderPanel(); refreshPrompt(); buildGizmos();
}
// lighter update for selection changes that must NOT rebuild the gizmo DOM mid-drag
function reflectSelection(){ renderPanel(); refreshPrompt(); renderTimeline(); }

// ---------- edit application: cascade vs explicit multi-select ----------
// Editing one property of the primary-selected node cascades to the consecutive
// run of neighbours that currently share its value (both directions, stopping at
// the first different value). When an explicit multi-selection is active, the edit
// applies to exactly that set with no cascade. A shift-selected set of one is the
// escape hatch to edit a single node without cascading.
function cascadeRun(p,i,prop){
  // For look-at, only nodes aimed at the EXACT same fixed point cascade together.
  // "Looking forward" returns NaN so it never matches (not even another forward
  // node) — toggling a forward node affects only itself.
  const get=n=> prop==='speed' ? n.speed
              : prop==='agl'   ? n.agl
              : (n.target ? n.target.x+','+n.target.y+','+n.target.z : NaN);
  const v0=get(p.nodes[i]); const run=[i];
  // cascade forwards only: the edited node and the following run that shares its
  // value, stopping at the first later waypoint the user set to something else.
  for(let k=i+1;k<p.nodes.length && get(p.nodes[k])===v0;k++) run.push(k);
  return run;
}
function writeProp(node,prop,value,idx){
  if(prop==='speed'){ node.speed=value; }
  else if(prop==='agl'){ node.agl=Math.max(HEIGHT_MIN,Math.min(HEIGHT_MAX,value));
    node.dronePos.y=terrainHeightAt(node.dronePos.x,node.dronePos.z)+node.agl; }
  else if(prop==='lookat'){ node.target = value==='forward' ? null : resolvedTarget(idx).clone(); }
}
function applyEdit(prop,value,baseIdx){
  const a=active(); if(!a) return;
  const base = baseIdx==null ? selectedNode : baseIdx;
  if(base<0 || !a.nodes[base]) return;
  pushHistory();
  const targets = (selMode==='multi' && selection.size && selection.has(base))
    ? [...selection] : cascadeRun(a,base,prop);
  targets.forEach(idx=>writeProp(a.nodes[idx],prop,value,idx));
  refreshAll();
}
// panel rows can belong to any path (not just the active one)
function applyEditFor(pathId,i,prop,value){
  if(pathId===activeId){ applyEdit(prop,value,i); return; }
  const p=paths.find(x=>x.id===pathId); if(!p) return;
  pushHistory();
  cascadeRun(p,i,prop).forEach(idx=>writeProp(p.nodes[idx],prop,value,idx));
  refreshAll();
}

// ============================ UNDO / REDO ============================
// Snapshot history of the editable state (paths + active path + global timeScale).
// Selection and camera are transient and intentionally not part of history.
const undoStack=[], redoStack=[], HISTORY_MAX=120;
function snapshot(){
  return JSON.stringify({ activeId, timeScale, pathSeq,
    paths: paths.map(p=>({ id:p.id, name:p.name, colour:p.colour, collapsed:p.collapsed,
      nodes: p.nodes.map(n=>({ d:[n.dronePos.x,n.dronePos.y,n.dronePos.z],
        t: n.target?[n.target.x,n.target.y,n.target.z]:null, speed:n.speed, agl:n.agl })) })) });
}
function restoreState(str){
  const s=JSON.parse(str);
  activeId=s.activeId; timeScale=s.timeScale; pathSeq=s.pathSeq;
  paths.length=0;
  s.paths.forEach(p=>paths.push({ id:p.id, name:p.name, colour:p.colour, collapsed:p.collapsed,
    nodes: p.nodes.map(n=>({ dronePos:new THREE.Vector3(n.d[0],n.d[1],n.d[2]),
      target: n.t?new THREE.Vector3(n.t[0],n.t[1],n.t[2]):null, speed:n.speed, agl:n.agl })) }));
  clearSelection(); previewing=false; scrubbing=false; setPreviewBtn();
  refreshAll();
}
// Call BEFORE a mutating action so the pre-change state can be returned to.
function commitHistory(snap){ undoStack.push(snap); if(undoStack.length>HISTORY_MAX) undoStack.shift(); redoStack.length=0; }
function pushHistory(){ commitHistory(snapshot()); }
function undo(){ if(!undoStack.length) return; redoStack.push(snapshot()); restoreState(undoStack.pop()); }
function redo(){ if(!redoStack.length) return; undoStack.push(snapshot()); restoreState(redoStack.pop()); }

// pointer-based waypoint reorder within the active path
let drag=null;
function attachReorder(el,p,index){
  el.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('iconBtn')) return;
    drag={p, from:index, to:index, rows:[...el.parentElement.querySelectorAll('.wp:not(.empty)')]};
    el.classList.add('dragging'); el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove',e=>{
    if(!drag) return;
    drag.rows.forEach(r=>r.classList.remove('drop-before','drop-after'));
    let to=drag.rows.length-1, marker=null, after=false;
    for(let k=0;k<drag.rows.length;k++){
      const r=drag.rows[k].getBoundingClientRect();
      if(e.clientY < r.top+r.height/2){ to=k; marker=drag.rows[k]; after=false; break; }
      if(k===drag.rows.length-1){ to=k; marker=drag.rows[k]; after=true; }
    }
    drag.to=to + (after?1:0);
    if(marker) marker.classList.add(after?'drop-after':'drop-before');
  });
  const end=e=>{
    if(!drag) return;
    drag.rows.forEach(r=>r.classList.remove('drop-before','drop-after','dragging'));
    let {from,to}=drag; const p=drag.p; if(to>from) to--;
    if(to!==from && to>=0 && to<p.nodes.length){
      pushHistory();
      const [n]=p.nodes.splice(from,1); p.nodes.splice(to,0,n);
      if(p.id===activeId) clearSelection();   // indices shifted; drop selection
    } else if(p.id===activeId){
      selectNode(index, !!(e && e.shiftKey));  // plain click selects · shift-click toggles in the set
    }
    drag=null; refreshAll();
  };
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
}

// ============================ PATH / NODE OPS ============================
function selectPath(id){
  activeId=id; previewing=false; setPreviewBtn();
  clearSelection();
  const a=active();
  if(a && a.nodes.length){ // frame it
    const c=new THREE.Vector3(); a.nodes.forEach(n=>c.add(n.dronePos)); c.divideScalar(a.nodes.length);
    camGoal.set(c.x,0,c.z);
  }
  refreshAll();
}
function addPath(){
  const p=newPath(); activeId=p.id; previewing=false; setPreviewBtn();
  clearSelection(); refreshAll();
}
// Place a new waypoint at the cursor. It inherits the previous waypoint's speed,
// height and look-at so the run continues until you deliberately change it; the
// very first waypoint falls back to the defaults (120 m, speed 2, look forward).
function appendNode(){
  const a=active(); if(!a||!mouseValid) return;
  pushHistory();
  const gy=mouseGround.y;
  const prev=a.nodes[a.nodes.length-1];
  const agl  = prev ? prev.agl  : DEFAULT_AGL;
  const speed= prev ? prev.speed: 2;
  const target = prev && prev.target ? prev.target.clone() : null;
  a.nodes.push({ dronePos:new THREE.Vector3(mouseGround.x,gy+agl,mouseGround.z), target, speed, agl });
  selectNode(a.nodes.length-1,false);
  refreshAll();
}
// Unified map click: hit a waypoint -> select it; empty map -> append a new one.
function handleMapClick(e){
  const a=active(); if(!a||!mouseValid) return;
  const additive = !!(e && e.shiftKey);
  const hit=pickNodeAt(e.clientX,e.clientY);
  if(hit>=0){ selectNode(hit, additive); refreshAll(); return; }
  if(additive) return;          // shift on empty space is reserved for box-select
  appendNode();
}
// nearest waypoint to a screen point, or -1 if none within the pick radius
function pickNodeAt(clientX,clientY){
  const a=active(); if(!a) return -1;
  const v=new THREE.Vector3(); let best=-1, bestD=20*20;
  a.nodes.forEach((n,i)=>{
    v.copy(n.dronePos).project(mapCam); if(v.z>1) return;
    const sx=(v.x*0.5+0.5)*innerWidth, sy=(-v.y*0.5+0.5)*innerHeight;
    const d=(sx-clientX)**2+(sy-clientY)**2;
    if(d<bestD){ bestD=d; best=i; }
  });
  return best;
}
function requestRemoveNode(pathId,i){
  showModal({ title:'Remove this waypoint?',
    body:'Are you sure you want to remove this waypoint? Any others in the flight path will remain.', warn:true,
    buttons:[ {label:'Keep waypoint', kind:'ghost'},
              {label:'Remove waypoint', kind:'danger', onClick:()=>{
                const p=paths.find(x=>x.id===pathId); if(p){ pushHistory(); p.nodes.splice(i,1); }
                if(pathId===activeId) clearSelection(); refreshAll(); }} ] });
}
// Confirm-and-remove the current selection (one or many), used by the Delete key.
function requestRemoveSelected(){
  const a=active(); if(!a||selectedNode<0) return;
  const idxs=(selection.size ? [...selection] : [selectedNode]).sort((x,y)=>y-x);
  const many=idxs.length>1;
  showModal({ title: many?`Remove ${idxs.length} waypoints?`:'Remove this waypoint?',
    body: many?'Remove the selected waypoints? The rest of the flight path will remain.'
              :'Are you sure you want to remove this waypoint? Any others in the flight path will remain.', warn:true,
    buttons:[ {label: many?'Keep waypoints':'Keep waypoint', kind:'ghost'},
              {label: many?'Remove waypoints':'Remove waypoint', kind:'danger', onClick:()=>{
                pushHistory(); idxs.forEach(idx=>a.nodes.splice(idx,1)); clearSelection(); refreshAll(); }} ] });
}
function requestDeletePath(id){
  const p=paths.find(x=>x.id===id); if(!p) return;
  showModal({ title:'Delete flight path?',
    body:`Delete "${p.name}" and all of its waypoints? This cannot be undone.`, warn:true,
    buttons:[ {label:'Keep path', kind:'ghost'},
              {label:'Delete path', kind:'danger', onClick:()=>{
                pushHistory();
                const idx=paths.findIndex(x=>x.id===id); paths.splice(idx,1);
                if(activeId===id){ activeId=paths.length?paths[Math.max(0,idx-1)].id:null; clearSelection(); }
                refreshAll(); }} ] });
}

// ============================ GIZMOS ============================
const gizmoLayer=$('gizmoLayer');
let gizmoEls=[];   // {el, handle, node}
function buildGizmos(){
  gizmoLayer.innerHTML=''; gizmoEls=[];
  const a=active(); if(!a||!a.nodes.length) return;
  // Full controls (arrows, speed, height, trash, look-at) on the primary selected
  // node only; every other node gets a lightweight square handle you can click to
  // select or drag to move. The selected node's target shows a handle when fixed.
  a.nodes.forEach((n,i)=>{
    const isSel = i===selectedNode || selection.has(i);
    const full  = i===selectedNode;
    gizmoEls.push(makeGizmo('drone',i,full,isSel));
    if(full && n.target) gizmoEls.push(makeGizmo('target',i,false,true));
  });
}
function makeGizmo(handle,nodeIndex,full,selected){
  const g=document.createElement('div'); g.className='gizmo'+(selected?' sel':'');
  const sq=document.createElement('div'); sq.className='gz-sq';
  const lab=document.createElement('div'); lab.className='gz-lab'; lab.style.left='10px'; lab.style.top='8px';

    const ax=document.createElement('div'); ax.className='gz-x';

      const tr=document.createElement('div'); tr.className='gz-trash'; tr.textContent='🗑'; tr.title='Delete waypoint';
      tr.onpointerdown=e=>e.stopPropagation();

      g.appendChild(tr);
      const sp=document.createElement('div'); sp.className='gz-spd'; sp.title='Speed — click to cycle, drag to change';
      sp.innerHTML=speedChevrons(active().nodes[nodeIndex].speed);
      attachSpeedScrub(sp, active().id, nodeIndex, 'gizmo');
      g.appendChild(sp);
      const hg=document.createElement('div'); hg.className='gz-hgt'; hg.title='Height above ground (20 m steps)';
      const hm=document.createElement('button'); hm.className='hb'; hm.textContent='−';
      const hv=document.createElement('span'); hv.className='hv'; hv.textContent=active().nodes[nodeIndex].agl+' m';
      const hp=document.createElement('button'); hp.className='hb'; hp.textContent='+';
      hm.onpointerdown=hp.onpointerdown=e=>e.stopPropagation();
      hm.onclick=e=>{ e.stopPropagation(); const n=active().nodes[nodeIndex]; applyEdit('agl',n.agl-HEIGHT_STEP,nodeIndex); };
      hp.onclick=e=>{ e.stopPropagation(); const n=active().nodes[nodeIndex]; applyEdit('agl',n.agl+HEIGHT_STEP,nodeIndex); };
      hg.append(hm,hv,hp); g.appendChild(hg);
      g._hval=hv;
      attachHeightScrub(hv, active().id, nodeIndex, 'gizmo');
      const nn=active().nodes[nodeIndex];
      const lk=document.createElement('div'); lk.className='gz-look'+(nn.target?' on':'');
      lk.textContent = '◎';
      lk.title = nn.target ? 'Look-at: fixed target (click for forward)' : 'Look-at: forward along path (click to set a fixed target)';
      lk.onpointerdown=e=>e.stopPropagation();
      lk.onclick=e=>{ e.stopPropagation(); const n=active().nodes[nodeIndex]; applyEdit('lookat', n.target?'forward':'explicit', nodeIndex); };
      g.appendChild(lk);
    }
  }
  sq.addEventListener('pointerdown',e=>{
    if(handle==='drone'){
      if(e.shiftKey){ e.stopPropagation(); e.preventDefault(); selectNode(nodeIndex,true); refreshAll(); return; }
      if(nodeIndex!==selectedNode){ selectNode(nodeIndex,false); reflectSelection(); }
    }
    startGizmoDrag(e,handle,nodeIndex,'xy');
  });

  return {el:g, handle, node:nodeIndex, hval:g._hval||null};
}
function handleVec(handle,n){ return handle==='drone'?n.dronePos:n.target; }
function syncGizmos(){
  if(!gizmoEls.length) return;
  const a=active(); if(!a) return;
  const pf=$('pipFrame'); const pr = pf.style.display==='block' ? pf.getBoundingClientRect() : null;
  const v=new THREE.Vector3();
  gizmoEls.forEach(gz=>{
    const n=a.nodes[gz.node]; if(!n){ gz.el.style.display='none'; return; }
    const hv3=handleVec(gz.handle,n); if(!hv3){ gz.el.style.display='none'; return; }
    v.copy(hv3).project(mapCam);
    if(v.z>1){ gz.el.style.display='none'; return; }
    const sx=(v.x*0.5+0.5)*innerWidth, sy=(-v.y*0.5+0.5)*innerHeight;
    // keep handles off the preview window so they don't overlap the camera view
    if(pr && sx>pr.left-45 && sx<pr.right+45 && sy>pr.top-45 && sy<pr.bottom+45){ gz.el.style.display='none'; return; }
    gz.el.style.display='block';
    gz.el.style.left=sx+'px'; gz.el.style.top=sy+'px';
    if(gz.hval) gz.hval.textContent=n.agl+' m';
  });
}
let gizmoDrag=null;
function startGizmoDrag(e,handle,nodeIndex,axis){
  e.stopPropagation(); e.preventDefault();
  gizmoDrag={handle,nodeIndex,axis,lastX:e.clientX,lastY:e.clientY,snap:snapshot(),moved:false};
  e.target.setPointerCapture(e.pointerId);
}
window.addEventListener('pointermove',e=>{
  if(!gizmoDrag) return;
  const a=active(); if(!a) return;
  const n=a.nodes[gizmoDrag.nodeIndex]; if(!n){ gizmoDrag=null; return; }
  const k=pxToWorld();
  const dx=(e.clientX-gizmoDrag.lastX)*k, dz=(e.clientY-gizmoDrag.lastY)*k;
  gizmoDrag.lastX=e.clientX; gizmoDrag.lastY=e.clientY;
  if(dx||dz) gizmoDrag.moved=true;
  const h=handleVec(gizmoDrag.handle,n);
  if(gizmoDrag.axis==='x'||gizmoDrag.axis==='xy') h.x+=dx;
  if(gizmoDrag.axis==='z'||gizmoDrag.axis==='xy') h.z+=dz;
  const clamp=WORLD/2-10; h.x=THREE.MathUtils.clamp(h.x,-clamp,clamp); h.z=THREE.MathUtils.clamp(h.z,-clamp,clamp);
  // re-drape height (drone keeps its own AGL above the new ground point)
  h.y = gizmoDrag.handle==='drone' ? terrainHeightAt(h.x,h.z)+n.agl : terrainHeightAt(h.x,h.z);
  // dragging a look-at handle snaps onto a nearby existing look-at point (same as right-drag)
  if(gizmoDrag.handle==='target'){
    const snap=snapToExistingTarget(new Set([gizmoDrag.nodeIndex]), e.clientX, e.clientY);
    if(snap) n.target.copy(snap);
  }
  rebuildPath(); rebuildCommitted();   // path first so tangents stay current; keep gizmo DOM
});
window.addEventListener('pointerup',()=>{ if(gizmoDrag){ if(gizmoDrag.moved) commitHistory(gizmoDrag.snap); gizmoDrag=null; refreshAll(); } });

// ============================ MODAL ============================
const modalWrap=$('modalWrap'), modalCard=$('modalCard');
let modalOpen=false;
function showModal({title,body,buttons,warn}){
  modalCard.className='modalCard'+(warn?' warn':'');

function closeModal(){ modalWrap.classList.remove('show'); modalOpen=false; }
modalWrap.addEventListener('pointerdown',e=>{ if(e.target===modalWrap) closeModal(); });

// ============================ INPUT ============================
const raycaster=new THREE.Raycaster(), ndc=new THREE.Vector2();
raycaster.layers.enable(2);   // also test the 3D gizmo arrows (layer 2)
function groundPointFromEvent(e){
  ndc.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(ndc,mapCam);
  const hit=raycaster.intersectObject(ground,false);
  if(hit.length){ mouseGround.copy(hit[0].point); }
  else{ const o=raycaster.ray.origin,d=raycaster.ray.direction;
    if(Math.abs(d.y)<1e-6) return false; const t=-o.y/d.y; if(t<=0) return false;
    mouseGround.set(o.x+d.x*t, terrainHeightAt(o.x+d.x*t,o.z+d.z*t), o.z+d.z*t); }
  const h=WORLD/2-10;
  mouseGround.x=THREE.MathUtils.clamp(mouseGround.x,-h,h);
  mouseGround.z=THREE.MathUtils.clamp(mouseGround.z,-h,h);
  return true;
}
function updateAim(){
  if(!mouseValid) return;
  const gy=mouseGround.y;
  $('roX').textContent=mouseGround.x.toFixed(0); $('roZ').textContent=(-mouseGround.z).toFixed(0);
  $('roElev').textContent=gy.toFixed(0); $('roDrone').textContent=(gy+DEFAULT_AGL).toFixed(0);
}
function pxToWorld(){ return (2*camHeight*Math.tan(THREE.MathUtils.degToRad(mapCam.fov/2)))/innerHeight; }
function panBy(dx,dy){ const k=pxToWorld(),h=WORLD/2-10;
  camGoal.x=THREE.MathUtils.clamp(camGoal.x-dx*k,-h,h); camGoal.z=THREE.MathUtils.clamp(camGoal.z-dy*k,-h,h);
  camCentre.copy(camGoal); }
function recentreToMouse(){ if(mouseValid) camGoal.set(mouseGround.x,0,mouseGround.z); else recentreView(); }
function recentreView(){
  const a=active();
  if(a && selectedNode>=0 && a.nodes[selectedNode]){ const n=a.nodes[selectedNode]; camGoal.set(n.dronePos.x,0,n.dronePos.z); }
  else if(a&&a.nodes.length){ const c=new THREE.Vector3(); a.nodes.forEach(n=>c.add(n.dronePos)); c.divideScalar(a.nodes.length); camGoal.set(c.x,0,c.z); }
  else camGoal.set(0,0,0);
}

let mousePanning=false, panLast={x:0,y:0};
canvas.addEventListener('mousemove',e=>{
  if(mousePanning){ panBy(e.clientX-panLast.x,e.clientY-panLast.y); panLast={x:e.clientX,y:e.clientY}; return; }
  mouseValid=groundPointFromEvent(e); updateAim();
});
canvas.addEventListener('mousedown',e=>{
  if(e.button===2){ e.preventDefault(); startLookatDrag(e); return; }   // right-press-drag = aim look-at
  if(e.button===0){
    if(e.shiftKey){ startBoxOrToggle(e); return; }
    const hit=pickNodeAt(e.clientX,e.clientY);
    if(hit>=0){ selectNode(hit,false); refreshAll(); }                  // select existing waypoint
    else if(active() && mouseValid){ startPlacement(e); }               // press-drag-release to place
  }
  else if(e.button===1){ e.preventDefault(); mousePanning=true; panLast={x:e.clientX,y:e.clientY}; }
});
window.addEventListener('mouseup',e=>{ if(e.button===1) mousePanning=false; });
canvas.addEventListener('contextmenu',e=>e.preventDefault());   // right-button handled in mousedown

// Press-drag-release placement: the new waypoint follows the cursor and previews
// live until you let go, instead of snapping to the first click point.
function startPlacement(e){
  mouseValid=groundPointFromEvent(e); if(!mouseValid) return;
  appendNode();                       // pushes history, adds + selects the node at the cursor
  const idx=selectedNode;
  const mv=ev=>{ const a=active(), n=a&&a.nodes[idx]; if(!n) return;
    mouseValid=groundPointFromEvent(ev);
    n.dronePos.set(mouseGround.x, terrainHeightAt(mouseGround.x,mouseGround.z)+n.agl, mouseGround.z);
    rebuildPath(); rebuildCommitted(); refreshPrompt(); };
  const up=()=>{ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); refreshAll(); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}

// Right-press-drag: aim the selected waypoint's look-at, previewing until release.
// Snaps onto a nearby existing look-at point so several waypoints can share the
// exact same target (which then cascade together).
function startLookatDrag(e){
  if(modalOpen) return;
  const a=active();
  if(!a || selectedNode<0){ clearSelection(); refreshAll(); return; }   // nothing selected -> deselect
  pushHistory();
  const targets = selection.size ? [...selection] : [selectedNode];
  const exclude = new Set(targets);
  const apply=ev=>{ mouseValid=groundPointFromEvent(ev);
    const snap = snapToExistingTarget(exclude, ev.clientX, ev.clientY);
    const t = snap || new THREE.Vector3(mouseGround.x,mouseGround.y,mouseGround.z);
    targets.forEach(idx=>{ const n=a.nodes[idx]; if(n) n.target=t.clone(); });
    rebuildPath(); rebuildCommitted(); refreshPrompt(); };
  apply(e);
  const mv=ev=>apply(ev);
  const up=ev=>{ if(ev.button!==2) return; window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); refreshAll(); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}
// nearest existing fixed look-at point (in screen space) to snap onto, or null
function snapToExistingTarget(excludeSet, sx, sy){
  const a=active(); if(!a) return null;
  const v=new THREE.Vector3(); let best=null, bestD=22*22;
  a.nodes.forEach((n,i)=>{ if(!n.target || excludeSet.has(i)) return;
    v.copy(n.target).project(mapCam); if(v.z>1) return;
    const px=(v.x*0.5+0.5)*innerWidth, py=(-v.y*0.5+0.5)*innerHeight;
    const d=(px-sx)**2+(py-sy)**2; if(d<bestD){ bestD=d; best=n.target; } });
  return best ? best.clone() : null;
}

// shift+click a node toggles it in the selection; shift+drag empty draws a box
function startBoxOrToggle(e){
  const hit=pickNodeAt(e.clientX,e.clientY);
  if(hit>=0){ selectNode(hit,true); refreshAll(); return; }
  beginBoxSelect(e);
}
let boxSel=null;
function beginBoxSelect(e){
  boxSel={x0:e.clientX,y0:e.clientY,cur:null};
  const d=document.createElement('div'); d.id='marquee';
  d.style.cssText='position:fixed;z-index:30;border:1px solid #3da9ff;background:rgba(61,169,255,.12);pointer-events:none;';
  document.body.appendChild(d); boxSel.el=d; updateMarquee(e.clientX,e.clientY);
  const mv=ev=>updateMarquee(ev.clientX,ev.clientY);
  const up=()=>{ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); finishBoxSelect(); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}
function updateMarquee(x,y){
  if(!boxSel) return;
  const l=Math.min(x,boxSel.x0), t=Math.min(y,boxSel.y0), w=Math.abs(x-boxSel.x0), h=Math.abs(y-boxSel.y0);
  boxSel.cur={l,t,r:l+w,b:t+h};
  Object.assign(boxSel.el.style,{left:l+'px',top:t+'px',width:w+'px',height:h+'px'});
}
function finishBoxSelect(){
  if(!boxSel) return;
  const a=active(), box=boxSel.cur;
  if(a && box && (box.r-box.l>3 || box.b-box.t>3)){
    selMode='multi'; const v=new THREE.Vector3();
    a.nodes.forEach((n,i)=>{ v.copy(n.dronePos).project(mapCam); if(v.z>1) return;
      const sx=(v.x*0.5+0.5)*innerWidth, sy=(-v.y*0.5+0.5)*innerHeight;
      if(sx>=box.l&&sx<=box.r&&sy>=box.t&&sy<=box.b){ selection.add(i); selectedNode=i; } });
  }
  if(boxSel.el) boxSel.el.remove();
  boxSel=null; refreshAll();
}
canvas.addEventListener('wheel',e=>{ e.preventDefault();

// touch — single finger places (drag to position, lift to commit) or selects a node; two fingers pan/zoom
let touchMode=null, multiTouched=false, gMid=null, gDist=0, touchPlaceIdx=-1;
const tMid=ts=>({x:(ts[0].clientX+ts[1].clientX)/2,y:(ts[0].clientY+ts[1].clientY)/2});
const tDist=ts=>Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY);
canvas.addEventListener('touchstart',e=>{ e.preventDefault();
  if(e.touches.length===1&&!multiTouched){ const t=e.touches[0];
    mouseValid=groundPointFromEvent(t); updateAim();
    const hit=pickNodeAt(t.clientX,t.clientY);
    if(hit>=0){ touchMode='aim'; selectNode(hit,false); refreshAll(); }
    else if(active()&&mouseValid){ touchMode='place'; appendNode(); touchPlaceIdx=selectedNode; }
    else touchMode='aim';
  }
  else if(e.touches.length>=2){ touchMode='gesture'; multiTouched=true; gMid=tMid(e.touches); gDist=tDist(e.touches); }
},{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault();
  if(touchMode==='gesture'&&e.touches.length>=2){ const mid=tMid(e.touches),d=tDist(e.touches);
    panBy(mid.x-gMid.x,mid.y-gMid.y); if(d>0&&gDist>0) camHeight=THREE.MathUtils.clamp(camHeight*gDist/d,250,5200);
    gMid=mid; gDist=d; }
  else if(touchMode==='place'&&e.touches.length===1){ const t=e.touches[0]; mouseValid=groundPointFromEvent(t);
    const a=active(), n=a&&a.nodes[touchPlaceIdx];
    if(n){ n.dronePos.set(mouseGround.x,terrainHeightAt(mouseGround.x,mouseGround.z)+n.agl,mouseGround.z);
      rebuildPath(); rebuildCommitted(); refreshPrompt(); } }
  else if(touchMode==='aim'&&e.touches.length===1){ mouseValid=groundPointFromEvent(e.touches[0]); updateAim(); }
},{passive:false});
canvas.addEventListener('touchend',e=>{ e.preventDefault();
  if(e.touches.length===0){
    if(touchMode==='place') refreshAll();
    touchMode=null; multiTouched=false; touchPlaceIdx=-1; }
},{passive:false});
canvas.addEventListener('touchcancel',()=>{ if(touchMode==='place') refreshAll(); touchMode=null; multiTouched=false; touchPlaceIdx=-1; });

window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ if(modalOpen) closeModal(); else { clearSelection(); refreshAll(); } return; }
  const el=document.activeElement, typing = el && /^(INPUT|TEXTAREA)$/.test(el.tagName);
  if(typing || modalOpen) return;                       // don't grab keys while editing text / in a modal
  if((e.key==='i'||e.key==='I')&&!e.repeat&&!e.ctrlKey&&!e.metaKey) recentreToMouse();
  if(e.key==='Delete'||e.key==='Backspace'){
    if(active() && selectedNode>=0){ e.preventDefault(); requestRemoveSelected(); }
  }
  if((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z') && !e.shiftKey){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey) && ((e.key==='y'||e.key==='Y') || (e.shiftKey && (e.key==='z'||e.key==='Z')))){ e.preventDefault(); redo(); return; }
});
